<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品集 · 鸽子笼</title>
  <meta name="description" content="erma0 的作品与工具集 — 收录日常小工具、开源项目与可点击的成果。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <!-- 顶部导航 -->
  <header class="site-header" id="siteHeader">
    <a class="brand" href="https://erma0.cn" aria-label="返回主页">
      <span class="brand__mark">🕊</span>
      <span class="brand__name">erma0</span>
      <span class="brand__sub">/ works</span>
    </a>
    <nav class="site-nav" aria-label="主导航">
      <a href="#works">作品</a>
      <a href="https://blog.erma0.cn" target="_blank" rel="noopener">博客 ↗</a>
      <a class="site-nav__ghost" href="https://erma0.cn">← 主页</a>
    </nav>
  </header>

  <main>
    <!-- 极简头部：一行标题 + 一行小字 -->
    <section class="hero" id="top">
      <p class="hero__eyebrow" data-reveal>SELECTED WORKS · 2026</p>
      <h1 class="hero__title">
        <span class="hero__line" data-split>做过的东西，</span>
        <span class="hero__line" data-split>挑能用的放这儿。</span>
      </h1>
      <p class="hero__sub" data-reveal>
        工具、开源项目、偶尔的小玩意儿 — 能点开的都是真的。
      </p>
    </section>

    <!-- 作品网格 -->
    <section class="works" id="works" aria-labelledby="worksTitle">
      <header class="section-head" data-reveal>
        <h2 id="worksTitle" class="section-title">
          <span class="section-title__cn">作品</span>
          <span class="section-title__en">Works</span>
        </h2>
      </header>

      <div class="grid" id="worksGrid">
        <!-- JS 数据驱动渲染，配置见 works.js -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p class="site-footer__row">
      <a href="https://erma0.cn">主页</a>
      <span class="sep">·</span>
      <a href="https://blog.erma0.cn" target="_blank" rel="noopener">博客</a>
      <span class="sep">·</span>
      <a href="https://github.com/erma0" target="_blank" rel="noopener">GitHub</a>
      <span class="sep">·</span>
      <a href="https://www.zhihu.com/people/Dovecote" target="_blank" rel="noopener">知乎</a>
    </p>
    <p class="site-footer__small">© 2026 鸽子笼 · 纯静态，零构建</p>
  </footer>

  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

  <script src="works.js"></script>
  <script src="main.js"></script>
</body>
</html>
