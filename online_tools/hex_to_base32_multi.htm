<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量十六进制 → Base32 转换器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>批量十六进制 → Base32 转换器</h1>
    <p class="tool-desc">逐行批量转换多个十六进制字符串为 Base32</p>
  </header>
  <section class="tool-body">
    <p>将十六进制字符串列表（每行一个，可从 Libre/OpenOffice Calc 的单列表格导出为 CSV 文件或直接选中复制）转换为 Base32 字符串列表。每行输出包含 Base32 字符串及逗号后的可选注释（转换失败时标注错误）。可将输出视为两列 CSV 文件，导入回 Calc。</p>

    <div class="form-card">
      <div class="field">
        <label class="field-label" for="hexList">十六进制字符串列表</label>
        <textarea id="hexList" rows="10" placeholder="每行一个十六进制字符串"></textarea>
        <span class="field-hint">每行一个 = 1 列 CSV；所有非十六进制字符将被忽略，输入不区分大小写</span>
      </div>
    </div>

    <div class="form-card">
      <div class="field">
        <label class="field-label">选项</label>
        <label><input type="checkbox" id="chbRemove0x" checked> 移除输入中的 "0x" 前缀</label>
        <br>
        <label><input type="checkbox" id="chbSkipComment" checked> 跳过注释列（逗号及后面的可选文本）</label>
      </div>
    </div>

    <div class="btn-group">
      <button type="button" onclick="Convert()">转换</button>
    </div>

    <div class="result-card">
      <div class="field">
        <label class="field-label" for="base32List">输出（Base32 + 注释）</label>
        <div class="input-row">
          <textarea id="base32List" rows="10" readonly></textarea>
          <button type="button" class="btn-copy" onclick="copyToClipboard(document.getElementById('base32List').value)"></button>
        </div>
        <span class="field-hint">两列 CSV，第二列为空 = 无错误</span>
      </div>
    </div>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>

<script>
document.querySelectorAll('.btn-copy').forEach(function(btn){ btn.innerHTML = ICON_COPY; });

function Convert() {
  var lines = document.getElementById('hexList').value.split('\n');
  var remove0x = document.getElementById('chbRemove0x').checked;
  var skipComment = document.getElementById('chbSkipComment').checked;
  var outputText = "";
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) { outputText += "\r\n"; continue; }
    var cleaned = cleanHex(line, remove0x);
    var status = "";
    var output = "";
    if (cleaned.length % 2 !== 0) {
      status = "错误：清理后的十六进制字符串长度为奇数。";
    } else {
      var bytes = hex2bytes(cleaned);
      output = base32Encode(bytes);
    }
    outputText += output;
    if (skipComment) {
      outputText += "\r\n";
    } else {
      outputText += ", " + status + "\r\n";
    }
  }
  document.getElementById('base32List').value = outputText;
}
</script>
</body>
</html>
