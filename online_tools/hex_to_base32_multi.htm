<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量十六进制 → Base32 转换器</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: '批量十六进制 → Base32 转换器',
  desc: '逐行批量转换多个十六进制字符串为 Base32',
  body: function(body) {
    var p = ToolPage.el('p');
    p.textContent = '将十六进制字符串列表（每行一个，可从 Libre/OpenOffice Calc 的单列表格导出为 CSV 文件或直接选中复制）转换为 Base32 字符串列表。每行输出包含 Base32 字符串及逗号后的可选注释（转换失败时标注错误）。可将输出视为两列 CSV 文件，导入回 Calc。';
    body.appendChild(p);

    var card1 = ToolPage.formCard();
    var ta = document.createElement('textarea');
    ta.id = 'hexList';
    ta.rows = 10;
    ta.placeholder = '每行一个十六进制字符串';
    card1.appendChild(ToolPage.field('十六进制字符串列表', '每行一个 = 1 列 CSV；所有非十六进制字符将被忽略，输入不区分大小写', ta));
    body.appendChild(card1);

    var card2 = ToolPage.formCard();
    var optField = ToolPage.field('选项');
    optField.appendChild(ToolPage.checkbox('chbRemove0x', '移除输入中的 "0x" 前缀', true));
    optField.appendChild(ToolPage.checkbox('chbSkipComment', '跳过注释列（逗号及后面的可选文本）', true));
    card2.appendChild(optField);
    body.appendChild(card2);

    body.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: Convert }]));

    var rc = ToolPage.el('div', 'result-card');
    rc.appendChild(ToolPage.field('输出（Base32 + 注释）', '两列 CSV，第二列为空 = 无错误', ToolPage.textareaRow('base32List', { rows: 10, readonly: true })));
    body.appendChild(rc);
  }
});

function Convert() {
  var lines = document.getElementById('hexList').value.split('\n');
  var remove0x = document.getElementById('chbRemove0x').checked;
  var skipComment = document.getElementById('chbSkipComment').checked;
  var outputText = "";
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) { outputText += "\r\n"; continue; }
    var cleaned = cleanHex(line, remove0x);
    var status = "";
    var output = "";
    if (cleaned.length % 2 !== 0) {
      status = "错误：清理后的十六进制字符串长度为奇数。";
    } else {
      var bytes = hex2bytes(cleaned);
      output = base32Encode(bytes);
    }
    outputText += output;
    if (skipComment) {
      outputText += "\r\n";
    } else {
      outputText += ", " + status + "\r\n";
    }
  }
  document.getElementById('base32List').value = outputText;
}
</script>
</body>
</html>
