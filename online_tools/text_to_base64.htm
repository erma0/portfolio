<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本 → Base64 编码器</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: '文本 → Base64 编码器',
  desc: '将 UTF-8 文本编码为 Base64 字符串',
  body: function(body) {

    var card1 = ToolPage.formCard();
    card1.appendChild(ToolPage.field('输入文本', null, ToolPage.textareaRow('inputText', { rows: 6, placeholder: '在此输入要编码的文本…' })));
    body.appendChild(card1);

    body.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: convert }]));

    var rc = ToolPage.el('div', 'result-card');
    rc.appendChild(ToolPage.field('Base64 输出', null, ToolPage.inputRow('outputBase64', { readonly: true, placeholder: '编码结果将显示在此处' })));
    body.appendChild(rc);
  }
});

function convert() {
  var text = document.getElementById('inputText').value;
  var bytes = [];
  for (var i = 0; i < text.length; i++) {
    var code = text.charCodeAt(i);
    if (code >= 0xD800 && code <= 0xDBFF && i + 1 < text.length) {
      var lo = text.charCodeAt(i + 1);
      if (lo >= 0xDC00 && lo <= 0xDFFF) {
        var cp = ((code - 0xD800) << 10) + (lo - 0xDC00) + 0x10000;
        bytes.push(0xF0 | (cp >> 18));
        bytes.push(0x80 | ((cp >> 12) & 0x3F));
        bytes.push(0x80 | ((cp >> 6) & 0x3F));
        bytes.push(0x80 | (cp & 0x3F));
        i++;
        continue;
      }
    }
    if (code < 0x80) {
      bytes.push(code);
    } else if (code < 0x800) {
      bytes.push(0xC0 | (code >> 6));
      bytes.push(0x80 | (code & 0x3F));
    } else {
      bytes.push(0xE0 | (code >> 12));
      bytes.push(0x80 | ((code >> 6) & 0x3F));
      bytes.push(0x80 | (code & 0x3F));
    }
  }
  document.getElementById('outputBase64').value = base64Encode(bytes);
}
</script>
</body>
</html>
