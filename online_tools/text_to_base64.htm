  <header class="tool-header">
    <h1>文本 → Base64 编码器</h1>
    <p class="tool-desc">将 UTF-8 文本编码为 Base64 字符串</p>
  </header>
  <section class="tool-body">
<script type="text/javascript">
//<!--
    var base64_chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/"
    function binary_to_base64(input) {
      var ret = new Array();
      var i = 0;
      var j = 0;
      var char_array_3 = new Array(3);
      var char_array_4 = new Array(4);
      var in_len = input.length;
      var pos = 0;
  
      while (in_len--)
      {
          char_array_3[i++] = input.charCodeAt(pos++);
          if (i == 3)
          {
              char_array_4[0] = (char_array_3[0] & 0xfc) >> 2;
              char_array_4[1] = ((char_array_3[0] & 0x03) << 4) + ((char_array_3[1] & 0xf0) >> 4);
              char_array_4[2] = ((char_array_3[1] & 0x0f) << 2) + ((char_array_3[2] & 0xc0) >> 6);
              char_array_4[3] = char_array_3[2] & 0x3f;
  
              for (i = 0; (i <4) ; i++)
                  ret += base64_chars.charAt(char_array_4[i]);
              i = 0;
          }
      }
  
      if (i)
      {
          for (j = i; j < 3; j++)
              char_array_3[j] = 0;
  
          char_array_4[0] = (char_array_3[0] & 0xfc) >> 2;
          char_array_4[1] = ((char_array_3[0] & 0x03) << 4) + ((char_array_3[1] & 0xf0) >> 4);
          char_array_4[2] = ((char_array_3[1] & 0x0f) << 2) + ((char_array_3[2] & 0xc0) >> 6);
          char_array_4[3] = char_array_3[2] & 0x3f;
  
          for (j = 0; (j < i + 1); j++)
              ret += base64_chars.charAt(char_array_4[j]);
  
          while ((i++ < 3))
              ret += '=';
  
      }
  
      return ret;
    }
    
    function Convert() {
      var text = document.frmConvert.source.value;
      document.frmConvert.base64.value = binary_to_base64(text);
    } 

//-->
</script>
<h3>文本 → Base64 字符串编码器</h3>
      <form name="frmConvert" action="">
				<p>文本：</p>
			    <p><textarea name="source" rows="10" cols="67"></textarea></p>			
        <p>输出 (base64):</p>
			    <p><input type="text" name="base64" value=""><button type="button" onclick="copyToClipboard(this.previousElementSibling.value)">复制</button></p>	    
			  <p>
			    <button type=button name="btnConvert"
            onclick="Convert()">
            转换
          </button>
			  </p>
			</form>
  </section>
