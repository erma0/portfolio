<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本 → Base64 编码器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>文本 → Base64 编码器</h1>
    <p class="tool-desc">将 UTF-8 文本编码为 Base64 字符串</p>
  </header>
  <section class="tool-body">
    <div class="form-card">
      <div class="field">
        <label class="field-label" for="inputText">输入文本</label>
        <textarea id="inputText" rows="6" placeholder="在此输入要编码的文本…"></textarea>
      </div>
    </div>
    <div class="btn-group">
      <button type="button" onclick="convert()">转换</button>
    </div>
    <div class="result-card">
      <div class="field">
        <label class="field-label">Base64 输出</label>
        <div class="input-row">
          <input type="text" id="outputBase64" readonly="readonly" placeholder="编码结果将显示在此处">
          <button type="button" class="btn-copy" onclick="copyToClipboard(document.getElementById('outputBase64').value)"><script>document.write(ICON_COPY)</script></button>
        </div>
      </div>
    </div>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>
<script>
function convert() {
  var text = document.getElementById('inputText').value;
  var bytes = [];
  for (var i = 0; i < text.length; i++) {
    var code = text.charCodeAt(i);
    if (code >= 0xD800 && code <= 0xDBFF && i + 1 < text.length) {
      var lo = text.charCodeAt(i + 1);
      if (lo >= 0xDC00 && lo <= 0xDFFF) {
        var cp = ((code - 0xD800) << 10) + (lo - 0xDC00) + 0x10000;
        bytes.push(0xF0 | (cp >> 18));
        bytes.push(0x80 | ((cp >> 12) & 0x3F));
        bytes.push(0x80 | ((cp >> 6) & 0x3F));
        bytes.push(0x80 | (cp & 0x3F));
        i++;
        continue;
      }
    }
    if (code < 0x80) {
      bytes.push(code);
    } else if (code < 0x800) {
      bytes.push(0xC0 | (code >> 6));
      bytes.push(0x80 | (code & 0x3F));
    } else {
      bytes.push(0xE0 | (code >> 12));
      bytes.push(0x80 | ((code >> 6) & 0x3F));
      bytes.push(0x80 | (code & 0x3F));
    }
  }
  document.getElementById('outputBase64').value = base64Encode(bytes);
}
</script>
</body>
</html>
