<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRC8 校验计算器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>CRC8 校验计算器</h1>
    <p class="tool-desc">在线计算数据的 CRC8 校验值，基于 <a href="https://www.maximintegrated.com/en/app-notes/index.mvp/id/27">Dallas/Maxim 应用笔记 27</a>（多项式 X^8+X^5+X^4+X^0），即 1-Wire 协议使用的 CRC8 规范。</p>
  </header>
  <section class="tool-body">

    <div class="form-card">
      <div class="field">
        <label class="field-label" for="inputInit">CRC8 初始值</label>
        <input type="text" id="inputInit" value="0x00">
        <span class="field-hint">1 字节十六进制，如 0x00 或 00</span>
      </div>

      <div class="field">
        <label class="field-label" for="inputHex">十六进制字符串</label>
        <input type="text" id="inputHex" value="">
        <span class="field-hint">十六进制集合以外的字符将被忽略，因此 "12AB34" = "12 AB 34" = "12, AB, 34" 等价，输入不区分大小写。</span>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="chkRemove0x" checked="checked">
          移除输入中的 "0x" 前缀
        </label>
      </div>
    </div>

    <div class="btn-group">
      <button type="button" onclick="Convert()">计算 CRC8</button>
    </div>

    <div class="result-card">
      <div class="field">
        <span class="field-label">清理后的输入</span>
        <div class="input-row">
          <input type="text" id="outputCleaned" readonly="readonly" value="">
          <button type="button" class="btn-copy" id="btnCopyCleaned" onclick="copyToClipboard(document.getElementById('outputCleaned').value)"></button>
        </div>
      </div>
      <div class="field">
        <span class="field-label">CRC8 校验结果</span>
        <div class="input-row">
          <input type="text" id="outputResult" readonly="readonly" value="">
          <button type="button" class="btn-copy" id="btnCopyResult" onclick="copyToClipboard(document.getElementById('outputResult').value)"></button>
        </div>
      </div>
    </div>

  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>

<script type="text/javascript">
var crc8table =
[
0, 94, 188, 226, 97, 63, 221, 131, 194, 156, 126, 32, 163, 253, 31, 65,
157, 195, 33, 127, 252, 162, 64, 30, 95, 1, 227, 189, 62, 96, 130, 220,
35, 125, 159, 193, 66, 28, 254, 160, 225, 191, 93, 3, 128, 222, 60, 98,
190, 224, 2, 92, 223, 129, 99, 61, 124, 34, 192, 158, 29, 67, 161, 255,
70, 24, 250, 164, 39, 121, 155, 197, 132, 218, 56, 102, 229, 187, 89, 7,
219, 133, 103, 57, 186, 228, 6, 88, 25, 71, 165, 251, 120, 38, 196, 154,
101, 59, 217, 135, 4, 90, 184, 230, 167, 249, 27, 69, 198, 152, 122, 36,
248, 166, 68, 26, 153, 199, 37, 123, 58, 100, 134, 216, 91, 5, 231, 185,
140, 210, 48, 110, 237, 179, 81, 15, 78, 16, 242, 172, 47, 113, 147, 205,
17, 79, 173, 243, 112, 46, 204, 146, 211, 141, 111, 49, 178, 236, 14, 80,
175, 241, 19, 77, 206, 144, 114, 44, 109, 51, 209, 143, 12, 82, 176, 238,
50, 108, 142, 208, 83, 13, 239, 177, 240, 174, 76, 18, 145, 207, 45, 115,
202, 148, 118, 40, 171, 245, 23, 73, 8, 86, 180, 234, 105, 55, 213, 139,
87, 9, 235, 181, 54, 104, 138, 212, 149, 203, 41, 119, 244, 170, 72, 22,
233, 183, 85, 11, 136, 214, 52, 106, 43, 117, 151, 201, 74, 20, 246, 168,
116, 42, 200, 150, 21, 75, 169, 247, 182, 232, 10, 84, 215, 137, 107, 53
];

function Convert() {
  var remove0x = document.getElementById('chkRemove0x').checked;
  var cleaned_hex = cleanHex(document.getElementById('inputHex').value, remove0x);
  document.getElementById('outputCleaned').value = cleaned_hex;

  if (cleaned_hex.length % 2) {
    showToast('错误：清理后的十六进制字符串长度为奇数。');
    return;
  }

  var binary = new Array();
  for (var i = 0; i < cleaned_hex.length / 2; i++) {
    var h = cleaned_hex.substr(i * 2, 2);
    binary[i] = parseInt(h, 16);
  }

  var cleaned_init = cleanHex(document.getElementById('inputInit').value, true);
  if (cleaned_init.length !== 2) {
    showToast('错误：初始值不像是 1 个字节（应为 2 位十六进制）。');
    return;
  }

  var result = parseInt(cleaned_init, 16);
  for (var i = 0; i < binary.length; i++) {
    result = crc8table[result ^ binary[i]];
  }
  document.getElementById('outputResult').value = '0x' + (result < 16 ? '0' : '') + dec2hex(result);
}

document.getElementById('btnCopyCleaned').innerHTML = ICON_COPY;
document.getElementById('btnCopyResult').innerHTML = ICON_COPY;
</script>
</body>
</html>
