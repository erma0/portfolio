<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本 → HTML 列表生成器</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: '文本 → HTML 列表生成器',
  desc: '将纯文本行转换为 HTML <ul>/<ol> 列表',
  body: function(body) {
    var p1 = ToolPage.el('p');
    p1.textContent = '将文本列表转换为嵌套的 HTML 无序列表。源文本各项以换行分隔，行首 Tab 数量决定嵌套层级。字符 &quot;、&amp;、&lt;、&gt; 会被替换为对应的 HTML 实体。';
    body.appendChild(p1);
    var p2 = ToolPage.el('p');
    p2.textContent = '可将 Tab 分隔的应用程序更新日志转换为嵌套 HTML 列表。';
    body.appendChild(p2);

    var exampleGroup = ToolPage.btnGroup([{ text: '加载示例', className: 'btn-outline', onclick: loadExample }]);
    exampleGroup.style.marginBottom = '0.75rem';
    body.appendChild(exampleGroup);

    var card1 = ToolPage.formCard();
    var ta = document.createElement('textarea');
    ta.id = 'ed_input';
    ta.rows = 10;
    ta.placeholder = '每行一个条目，行首 Tab 表示嵌套层级';
    ta.addEventListener('keydown', function(e) { return interceptTabs(e, this); });
    card1.appendChild(ToolPage.field('源文本', '支持 Tab 键输入；行首 Tab 数量决定嵌套深度', ta));
    body.appendChild(card1);

    var card2 = ToolPage.formCard();
    var optField = ToolPage.field('选项');
    optField.appendChild(ToolPage.checkbox('chbRemovePrefix', '若行首存在前缀则移除该前缀并左对齐'));
    var prefixDiv = ToolPage.el('div');
    prefixDiv.style.marginTop = '0.4rem';
    var prefixLabel = ToolPage.el('span', 'field-label');
    prefixLabel.textContent = '行首前缀';
    prefixDiv.appendChild(prefixLabel);
    var prefixInput = document.createElement('input');
    prefixInput.type = 'text';
    prefixInput.id = 'linePrefix';
    prefixInput.value = '-';
    prefixInput.style.maxWidth = '8rem';
    prefixDiv.appendChild(prefixInput);
    optField.appendChild(prefixDiv);
    card2.appendChild(optField);
    body.appendChild(card2);

    body.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: Convert }]));

    var rc = ToolPage.el('div', 'result-card');
    rc.appendChild(ToolPage.field('HTML 输出', null, ToolPage.textareaRow('ed_output', { rows: 12, readonly: true })));
    body.appendChild(rc);
  }
});

function insertAtCursor(myField, myValue) {
  if (document.selection) {
    myField.focus();
    var sel = document.selection.createRange();
    sel.text = myValue;
  } else if (myField.selectionStart || myField.selectionStart === 0) {
    var startPos = myField.selectionStart;
    var endPos = myField.selectionEnd;
    var restoreTop = myField.scrollTop;
    myField.value = myField.value.substring(0, startPos) + myValue + myField.value.substring(endPos);
    myField.selectionStart = startPos + myValue.length;
    myField.selectionEnd = startPos + myValue.length;
    if (restoreTop > 0) myField.scrollTop = restoreTop;
  } else {
    myField.value += myValue;
  }
}

function interceptTabs(evt, control) {
  var key = evt.keyCode ? evt.keyCode : evt.which ? evt.which : evt.charCode;
  if (key === 9) {
    insertAtCursor(control, '\t');
    return false;
  }
  return key;
}

function createHtmlList(input) {
  var output = "";
  var re = /\r\n|\n\r|\n|\r/g;
  var arrayOfLines = input.replace(re, "\n").split("\n");

  function prepareLine(line) {
    if (document.getElementById('chbRemovePrefix').checked) {
      var prefix = document.getElementById('linePrefix').value;
      if (line.indexOf(prefix) === 0) {
        line = line.substring(prefix.length);
        line = line.replace(/^\s+/, "");
      }
    }
    var result = "";
    for (var i = 0; i < line.length; i++) {
      switch (line[i]) {
        case '"': result += "&quot;"; break;
        case '&': result += "&amp;"; break;
        case '<': result += "&lt;"; break;
        case '>': result += "&gt;"; break;
        default: result += line[i]; break;
      }
    }
    return result;
  }

  var previousLevel = -1;
  for (var index = 0; index < arrayOfLines.length; ++index) {
    var line = arrayOfLines[index];
    var newLevel = 0;
    var i = 0;
    while (i < line.length) {
      if (line[i] !== '\t') break;
      newLevel++;
      i++;
    }
    line = line.substring(newLevel);
    line = prepareLine(line);

    if (newLevel > previousLevel) {
      if (previousLevel >= 0) output += "\n";
      output += Array(newLevel + 1).join("\t");
      output += "<ul>\n";
      output += Array(newLevel + 2).join("\t");
      output += "<li>";
      output += line;
      previousLevel = newLevel;
    } else if (newLevel === previousLevel) {
      output += "</li>\n";
      output += Array(newLevel + 2).join("\t");
      output += "<li>";
      output += line;
    } else {
      if (previousLevel > 0) output += "</li>\n";
      while (previousLevel > newLevel) {
        output += Array(previousLevel + 1).join("\t");
        output += "</ul>\n";
        output += Array(previousLevel + 1).join("\t");
        output += "</li>\n";
        previousLevel--;
      }
      output += Array(newLevel + 2).join("\t");
      output += "<li>";
      output += line;
    }
  }

  if (previousLevel >= 0) output += "</li>\n";
  while (previousLevel >= 0) {
    output += Array(previousLevel + 1).join("\t");
    output += "</ul>\n";
    if (previousLevel > 0) {
      output += Array(previousLevel + 1).join("\t");
      output += "</li>\n";
    }
    previousLevel--;
  }

  return output;
}

function Convert() {
  var output = createHtmlList(document.getElementById('ed_input').value);
  document.getElementById('ed_output').value = output;
}

function loadExample() {
  document.getElementById('ed_input').value = "Item1\nItem2\n\tSubItem2_1\n\tSubItem2_2\nItem3";
}
</script>
</body>
</html>
