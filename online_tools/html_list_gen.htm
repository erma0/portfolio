<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本 → HTML 列表生成器</title>
  <link rel="stylesheet" href="./css/tool.css">

</head>
<body>
<div id="bg"></div>
<main class="container">
  <nav class="top-nav">
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>文本 → HTML 列表生成器</h1>
    <p class="tool-desc">将纯文本行转换为 HTML <ul>/<ol> 列表</p>
  </header>
  <section class="tool-body">
<script type="text/javascript">
//<!--

        function insertAtCursor(myField, myValue) {
          //IE support
          if (document.selection) {
            myField.focus();
            sel = document.selection.createRange();
            sel.text = myValue;
          }

          //MOZILLA/NETSCAPE support
          else if (myField.selectionStart || myField.selectionStart == '0') {
            var startPos = myField.selectionStart;
            var endPos = myField.selectionEnd;
            restoreTop = myField.scrollTop;

            myField.value = myField.value.substring(0, startPos) + myValue + myField.value.substring(endPos, myField.value.length);

            myField.selectionStart = startPos + myValue.length;
            myField.selectionEnd = startPos + myValue.length;

            if (restoreTop > 0) {
              myField.scrollTop = restoreTop;
            }
          }
          else {
            myField.value += myValue;
          }
        }

      function interceptTabs(evt, control) {
        key = evt.keyCode ? evt.keyCode : evt.which ? evt.which : evt.charCode;
        if (key == 9) {
          insertAtCursor(control, '\t');
          return false;
        }
        else {
          return key;
        }
      }

      function createHtmlList(input) {
        var output = "";

        var re = /\r\n|\n\r|\n|\r/g;
        arrayofLines = input.replace(re,"\n").split("\n");

        function prepareLine(input) {
          var i = 0;
          var output = "";
          if (document.frmConvert.chbRemovePrefix.checked) {
            var prefix = document.frmConvert.linePrefix.value;
            if (input.indexOf(prefix) === 0) {
              input = input.substring(prefix.length);
              // left-trim
              input = input.replace(/^\s+/,"");
            }
          }
          while (i < input.length) {
            switch (input[i]) {
              case '\"':
                output += "&quot;";
                break;
              case '&':
                output += "&amp;";
                break;
              case '<':
                output += "&lt;";
                break;
              case '>':
                output += "&gt;";
                break;
              default:
                output += input[i];
                break;
            }
            i++;
          }    
          return output;
        }

        var previousLevel = -1;
        for (index = 0; index < arrayofLines.length; ++index) {
          var line = arrayofLines[index];
          
          // count leading tab characters
          var newLevel = 0;
          var i = 0;
          while (i < line.length) {
            if (line[i] != '\t') {
              break;
            }
            newLevel++;
            i++;
          }
          
          // get rid of leading tabs
          line = line.substring(newLevel);
          line = prepareLine(line);

          if (newLevel > previousLevel) {
            if (previousLevel >= 0) {
              output += "\n";
            }
            output += Array(newLevel + 1).join("\t");
            output += "<ul>\n";
            output += Array(newLevel + 2).join("\t");
            output += "<li>";
            output += line;
            previousLevel = newLevel;
          } else if (newLevel == previousLevel) {
            output += "</li>\n";            
            output += Array(newLevel + 2).join("\t");
            output += "<li>";
            output += line;           
          } else {
            if (previousLevel > 0) {
              output += "</li>\n";
            }            
            while (previousLevel > newLevel) {            
              output += Array(previousLevel + 1).join("\t");
              output += "</ul>\n";
              output += Array(previousLevel + 1).join("\t");
              output += "</li>\n";              
              previousLevel--;              
            }
            output += Array(newLevel + 2).join("\t");
            output += "<li>";
            output += line;            
          }

        }

        if (previousLevel >= 0) {
          output += "</li>\n";
        }
        while (previousLevel >= 0) {
          output += Array(previousLevel + 1).join("\t");
          output += "</ul>\n";
          if (previousLevel > 0) {
            output += Array(previousLevel + 1).join("\t");
            output += "</li>\n";
          }
          previousLevel--;              
        }

        return output;
      }

      function Convert() {
        var output = createHtmlList(document.frmConvert.ed_input.value);
        document.frmConvert.ed_output.value = output;
      }

      function loadExample() {
        document.frmConvert.ed_input.value = "Item1\nItem2\n\tSubItem2_1\n\tSubItem2_2\nItem3";
      }

//-->
</script>
<p>将文本列表转换为嵌套的 HTML 无序列表。源文本各项以换行分隔，行首 Tab 数量决定嵌套层级。字符 &quot;、&amp;、&lt;、&gt; 会被替换为对应的 HTML 实体。
	</p>
	<p>
		我将此工具用于将 Tab 分隔的应用程序更新日志转换为嵌套 HTML 列表。
	</p>
	<form name="frmConvert" action="">
		<p>
			<button type=button name="btnConvert" onclick="loadExample()">
				加载示例
			</button>
		</p>
		<p>源文本：</p>
		<p>
			<textarea onkeydown="return interceptTabs(event, this);" name="ed_input" rows="10" cols="67" style="width: 550px;"></textarea>
		</p>
		<p>
			<input type="checkbox" name="chbRemovePrefix">若行首存在前缀 <input type="text" name="linePrefix" value="-" style="width: 50px;"> 则移除该前缀并左对齐
		</p>
		<p>
			<button type=button name="btnConvert" onclick="Convert()">
				转换
			</button>
		</p>
		<p>HTML 输出</p>
		<p>
			<textarea name="ed_output" rows="12" cols="67" style="width: 550px;"></textarea>
		</p>
	</form>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>
</body>
</html>
