<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHA1 哈希计算器</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
  <script src="./js/rusha.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: 'SHA1 哈希计算器',
  desc: '在线计算文本或文件的 SHA1 哈希值，支持混合输入（文本、十六进制或文件，可任意组合添加到哈希）。使用 Rusha 库，纯客户端运行。',
  body: function(body) {
    var card1 = ToolPage.formCard();
    card1.appendChild(ToolPage.field(null, null, ToolPage.btnGroup([{text: '重新初始化（清空哈希状态）', className: 'btn-outline', onclick: hashInit}])));
    body.appendChild(card1);

    var card2 = ToolPage.formCard();
    card2.appendChild(ToolPage.field('输入数据', '输入文本或十六进制字符串，然后选择更新方式', ToolPage.inputRow('sha1Input', {placeholder: '输入文本或十六进制字符串'})));
    card2.appendChild(ToolPage.btnGroup([
      {text: '以文本方式更新', onclick: hashUpdateText},
      {text: '以十六进制方式更新', onclick: hashUpdateHex}
    ]));
    body.appendChild(card2);

    var card3 = ToolPage.formCard();
    card3.appendChild(ToolPage.fileField('sha1FileInput', '文件输入'));
    var fileHint = ToolPage.el('span', 'field-hint');
    fileHint.textContent = '选择文件后立即将文件内容添加到哈希计算';
    card3.appendChild(fileHint);
    body.appendChild(card3);

    body.appendChild(ToolPage.btnGroup([{text: '完成计算 / 获取结果', onclick: hashFinish}]));

    var result = ToolPage.resultCard('resultArea', 'SHA1 结果');
    result.appendChild(ToolPage.inputRow('sha1Output', {readonly: true, placeholder: '点击「完成计算」获取结果'}));
    body.appendChild(result);
  }
});

var rusha = new Rusha();
var initialized = false;

function hashInit() {
  rusha.resetState();
  document.getElementById('sha1Output').value = '';
  initialized = true;
  showToast('哈希状态已清空');
}

function hashUpdateText() {
  if (!initialized) hashInit();
  var inp = document.getElementById('sha1Input').value;
  rusha.append(inp);
  showToast('已以文本方式更新');
}

function hashUpdateHex() {
  if (!initialized) hashInit();
  var inp = document.getElementById('sha1Input').value.toUpperCase();
  var chars = '0123456789ABCDEF';
  for (var i = 0; i < inp.length; i++) {
    if (chars.indexOf(inp.charAt(i)) === -1) {
      showToast('错误：不是有效的十六进制字符串，包含非十六进制字符');
      return;
    }
  }
  if (inp.length % 2) {
    showToast('错误：不是有效的十六进制字符串，长度不是 2 字节的整数倍');
    return;
  }
  var arr = [];
  for (var i = 0; i < inp.length; i += 2) {
    arr.push(hex2dec(inp.substr(i, 2)));
  }
  rusha.append(arr);
  showToast('已以十六进制方式更新');
}

function hashFinish() {
  initialized = false;
  var hexHash = rusha.end();
  document.getElementById('sha1Output').value = hexHash;
}

function readFileAsArray(file) {
  var reader = new FileReader();
  reader.onload = function() {
    var uint8View = new Uint8Array(reader.result);
    if (!initialized) hashInit();
    rusha.append(uint8View);
    showToast('已添加文件内容');
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('sha1FileInput').addEventListener('change', function(e) {
  if (e.target.files && e.target.files[0]) {
    readFileAsArray(e.target.files[0]);
  }
});
</script>
</body>
</html>
