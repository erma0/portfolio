<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="在线工具集 — 编码解码 / 哈希计算 / 数据转换 — works.erma0.cn" />
  <meta name="theme-color" content="#f6f3ec" />
  <meta property="og:image" content="https://works.erma0.cn/og-image.png" />
  <title>在线工具 · 鸽子笼</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tools-index.css" />
  <script src="./js/tools-registry.js"></script>
  <script>document.documentElement.className='js'</script>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-header" id="siteHeader" data-nav="tools-index"></header>
  <script src="../nav.js"></script>

  <main class="tools-page">
    <section class="tools-hero" data-reveal>
      <p class="tools-hero__eyebrow">ONLINE TOOLS</p>
      <h1 class="tools-hero__title">在线工具</h1>
      <p class="tools-hero__sub">编码解码、哈希计算、数据转换 — 打开即用，无需登录。</p>
    </section>

    <section class="tool-grid" aria-label="工具分类" id="toolGrid"></section>
  </main>

  <footer class="site-footer">
    <p class="site-footer__row">
      <a href="https://erma0.cn">主页</a>
      <span class="sep" aria-hidden="true">·</span>
      <a href="../">作品集</a>
      <span class="sep" aria-hidden="true">·</span>
      <a href="https://github.com/erma0" target="_blank" rel="noopener noreferrer">GitHub</a>
    </p>
    <p class="site-footer__small">© 2026 鸽子笼</p>
  </footer>

  <script>
    (function () {
      var grid = document.getElementById('toolGrid');
      window.__TOOLS.forEach(function (cat) {
        var div = document.createElement('div');
        div.className = 'tool-category';
        div.setAttribute('data-reveal', '');
        div.innerHTML = '<h2 class="tool-category__title">' +
          '<span class="tool-category__cn">' + cat.cn + '</span>' +
          '<span class="tool-category__en">' + cat.en + '</span>' +
          '</h2>';
        var list = document.createElement('div');
        list.className = 'tool-list';
        cat.tools.forEach(function (tool) {
          var a = document.createElement('a');
          a.href = './' + tool.file;
          a.textContent = tool.title;
          list.appendChild(a);
        });
        div.appendChild(list);
        grid.appendChild(div);
      });
    })();
  </script>
  <script defer src="../animations.js"></script>
</body>
</html>
