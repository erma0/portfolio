<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件 → 十六进制转换器</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: '文件 → 十六进制转换器',
  desc: '将本地文件内容转换为十六进制字符串（纯客户端）',
  body: function(body) {
    var p = ToolPage.el('p');
    p.textContent = '客户端处理（JavaScript，数据不会上传服务器）。将本地文件转换为十六进制字符串。注意：文件大于 1MB 时可能导致资源消耗过高，大文件建议使用离线工具。';
    body.appendChild(p);

    // 选项卡片
    var card1 = ToolPage.formCard();
    var optField = ToolPage.field('选项');
    var cb1 = ToolPage.checkbox('chbSeparator', '使用 0x 前缀及逗号分隔符（C 风格）', true);
    var cb2 = ToolPage.checkbox('chbNewline', '每 16 字节插入换行', true);
    optField.appendChild(cb1);
    optField.appendChild(ToolPage.el('br'));
    optField.appendChild(cb2);
    card1.appendChild(optField);
    body.appendChild(card1);

    // 文件选择卡片
    var card2 = ToolPage.formCard();
    card2.appendChild(ToolPage.fileField('fileInput', '选择文件'));
    var dzField = ToolPage.field();
    dzField.appendChild(ToolPage.dropZone('dropZone', '📁 拖放文件至此'));
    card2.appendChild(dzField);
    body.appendChild(card2);

    // 结果卡片
    var card3 = ToolPage.resultCard(null, '十六进制输出');
    var ta = document.createElement('textarea');
    ta.id = 'edOutput';
    ta.rows = 10;
    ta.readOnly = true;
    card3.appendChild(ta);
    card3.appendChild(ToolPage.btnGroup([
      { text: '复制到剪贴板', onclick: function() { copyToClipboard(document.getElementById('edOutput').value); } }
    ]));
    body.appendChild(card3);

    // 外部链接
    var p2 = ToolPage.el('p');
    p2.innerHTML = '另见：<br>'
      + '<a href="http://erma0.cn/bin/bin2hex/bin2hex.exe">bin2hex.exe（Windows）</a>'
      + ' / <a href="http://erma0.cn/bin/bin2hex/bin2hex">bin2hex（Linux）</a>'
      + ' （<a href="http://erma0.cn/bin/bin2hex/bin2hex.c">源码 bin2hex.c</a>）<br>'
      + '支持纯十六进制输出和自定义换行长度的版本：<a href="http://erma0.cn/bin/bin2hex/20190615/bin2hex.exe">bin2hex.exe</a>（<a href="http://erma0.cn/bin/bin2hex/20190615/bin2hex.c">bin2hex.c</a>）';
    body.appendChild(p2);

    // 逻辑
    function processFile(data) {
      var useSeparator = document.getElementById('chbSeparator').checked;
      var useNewline = document.getElementById('chbNewline').checked;
      var separator = useSeparator ? ', 0x' : '';
      var hexText = useSeparator ? '0x' : '';
      for (var i = 0; i < data.length; i++) {
        hexText += (i !== 0 ? separator : '') + (data[i] < 16 ? '0' : '') + dec2hex(data[i]);
        if (useNewline && (i + 1) % 16 === 0 && i !== data.length - 1) {
          hexText += '\n';
        }
      }
      document.getElementById('edOutput').value = hexText;
    }

    document.getElementById('fileInput').addEventListener('change', function(event) {
      openFile(event, function(result) {
        processFile(result.data);
      });
    });

    // 拖放
    var dz = document.getElementById('dropZone');
    dz.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.stopPropagation();
      dz.classList.add('drag-over');
    });
    dz.addEventListener('dragleave', function(e) {
      e.preventDefault();
      e.stopPropagation();
      dz.classList.remove('drag-over');
    });
    dz.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      dz.classList.remove('drag-over');
      var file = e.dataTransfer.files && e.dataTransfer.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        processFile(new Uint8Array(ev.target.result));
      };
      reader.readAsArrayBuffer(file);
    });
  }
});
</script>
</body>
</html>
