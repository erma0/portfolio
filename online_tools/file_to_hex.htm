<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件 → 十六进制转换器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>文件 → 十六进制转换器</h1>
    <p class="tool-desc">将本地文件内容转换为十六进制字符串（纯客户端）</p>
  </header>
  <section class="tool-body">
    <p>客户端处理（JavaScript，数据不会上传服务器）。将本地文件转换为十六进制字符串。注意：文件大于 1MB 时可能导致资源消耗过高，大文件建议使用离线工具。</p>

    <div class="form-card">
      <div class="field">
        <span class="field-label">选项</span>
        <label><input type="checkbox" id="chbSeparator" checked> 使用 0x 前缀及逗号分隔符（C 风格）</label>
        <br>
        <label><input type="checkbox" id="chbNewline" checked> 每 16 字节插入换行</label>
      </div>
    </div>

    <div class="form-card">
      <div class="field">
        <span class="field-label">选择文件</span>
        <input type="file" id="fileInput" onchange="handleFile(event)">
      </div>
      <div class="field">
        <div class="drop-zone" id="dropZone">
          <span class="drop-zone__icon">📁</span>
          <strong>拖放文件至此</strong>
        </div>
      </div>
    </div>

    <div class="result-card">
      <span class="field-label">十六进制输出</span>
      <textarea id="edOutput" rows="10" readonly="readonly"></textarea>
      <div class="btn-group">
        <button type="button" onclick="copyToClipboard(document.getElementById('edOutput').value)">复制到剪贴板</button>
      </div>
    </div>

    <p>另见：<br>
      <a href="http://erma0.cn/bin/bin2hex/bin2hex.exe">bin2hex.exe（Windows）</a>
      / <a href="http://erma0.cn/bin/bin2hex/bin2hex">bin2hex（Linux）</a>
      （<a href="http://erma0.cn/bin/bin2hex/bin2hex.c">源码 bin2hex.c</a>）<br>
      支持纯十六进制输出和自定义换行长度的版本：<a href="http://erma0.cn/bin/bin2hex/20190615/bin2hex.exe">bin2hex.exe</a>（<a href="http://erma0.cn/bin/bin2hex/20190615/bin2hex.c">bin2hex.c</a>）
    </p>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>

<script>
function processFile(data) {
  var useSeparator = document.getElementById('chbSeparator').checked;
  var useNewline = document.getElementById('chbNewline').checked;
  var separator = useSeparator ? ', 0x' : '';
  var hexText = useSeparator ? '0x' : '';

  for (var i = 0; i < data.length; i++) {
    hexText += (i !== 0 ? separator : '') + (data[i] < 16 ? '0' : '') + dec2hex(data[i]);
    if (useNewline && (i + 1) % 16 === 0 && i !== data.length - 1) {
      hexText += '\n';
    }
  }
  document.getElementById('edOutput').value = hexText;
}

function handleFile(event) {
  openFile(event, function (result) {
    processFile(result.data);
  });
}

// Drag and drop
(function () {
  var dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', function (e) {
    e.preventDefault();
    e.stopPropagation();
    dz.classList.add('drag-over');
  });
  dz.addEventListener('dragleave', function (e) {
    e.preventDefault();
    e.stopPropagation();
    dz.classList.remove('drag-over');
  });
  dz.addEventListener('drop', function (e) {
    e.preventDefault();
    e.stopPropagation();
    dz.classList.remove('drag-over');
    var file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      processFile(new Uint8Array(ev.target.result));
    };
    reader.readAsArrayBuffer(file);
  });
})();
</script>
</body>
</html>
