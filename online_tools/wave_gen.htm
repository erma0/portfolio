<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAV 音频文件生成器</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: 'WAV 音频文件生成器',
  desc: '在线生成指定频率和时长的 WAV 格式音频文件',
  body: function(body) {
    var p1 = ToolPage.el('p');
    p1.textContent = '客户端 JavaScript WAV 音频文件生成器。Audacity 虽有测试信号生成功能，但缺少某些特性——尤其是无法方便地生成 DC 偏置信号。本生成器旨在简化这类操作，替代之前需要生成 16 位采样二进制文件再导入 Audacity 的繁琐流程。';
    body.appendChild(p1);
    var p2 = ToolPage.el('p');
    p2.textContent = '波形由采样频率、每采样位深以及采样值的 JavaScript 公式来描述。';
    body.appendChild(p2);

    // Card 1: sampling parameters
    var card1 = ToolPage.formCard();
    var sfInput = document.createElement('input');
    sfInput.type = 'text';
    sfInput.id = 'samplingFrequency';
    sfInput.value = '48000';
    card1.appendChild(ToolPage.field('采样频率（Hz）', null, sfInput));

    card1.appendChild(ToolPage.field('采样位深', null, ToolPage.select('bitsPerSample', [{value:'16', label:'16 位'}, {value:'24', label:'24 位'}], '16')));

    var nsInput = document.createElement('input');
    nsInput.type = 'text';
    nsInput.id = 'numberOfSamples';
    nsInput.value = '192000';
    card1.appendChild(ToolPage.field('总采样点数', null, nsInput));
    body.appendChild(card1);

    // Card 2: formula + symbols + examples
    var card2 = ToolPage.formCard();
    var formulaTa = document.createElement('textarea');
    formulaTa.id = 'formula';
    formulaTa.rows = 4;
    formulaTa.value = '10000 * Math.sin(2 * Math.PI * 1000/samplingFrequency * n)';
    card2.appendChild(ToolPage.field('波形公式', '直接执行的 JavaScript 表达式', formulaTa));

    // Symbols
    var symbolsField = ToolPage.field('可用符号');
    var dl1 = ToolPage.el('dl');
    var dt1 = ToolPage.el('dt'); dt1.innerHTML = '<strong>n</strong>';
    var dd1 = ToolPage.el('dd'); dd1.textContent = '采样点索引';
    dl1.appendChild(dt1); dl1.appendChild(dd1);
    var dt2 = ToolPage.el('dt'); dt2.innerHTML = '<strong>samplingFrequency</strong>';
    var dd2 = ToolPage.el('dd'); dd2.textContent = '采样频率（即上方填写的值）';
    dl1.appendChild(dt2); dl1.appendChild(dd2);
    symbolsField.appendChild(dl1);
    card2.appendChild(symbolsField);

    // Examples
    var examplesField = ToolPage.field('示例', '不同波形可以自由组合（相加）。采样值计算后会根据所选位深进行饱和限幅。');
    var dl2 = ToolPage.el('dl');
    var dt3 = ToolPage.el('dt'); dt3.innerHTML = '<strong>3</strong>';
    var dd3 = ToolPage.el('dd'); dd3.textContent = '所有采样点均为常量 3（DC 偏置）';
    dl2.appendChild(dt3); dl2.appendChild(dd3);
    var dt4 = ToolPage.el('dt'); dt4.innerHTML = '<strong>n % 10000</strong>';
    var dd4 = ToolPage.el('dd'); dd4.textContent = '锯齿波，值从 0 升至 9999 后循环';
    dl2.appendChild(dt4); dl2.appendChild(dd4);
    var dt5 = ToolPage.el('dt'); dt5.innerHTML = '<strong>((n/(samplingFrequency/(2*50))) &amp; 0x01) ? 8000 : -4000</strong>';
    var dd5 = ToolPage.el('dd'); dd5.textContent = '非对称（+8000/-4000）50Hz 方波';
    dl2.appendChild(dt5); dl2.appendChild(dd5);
    var dt6 = ToolPage.el('dt'); dt6.innerHTML = '<strong>10000 * Math.sin(2 * Math.PI * 1000/samplingFrequency * n)</strong>';
    var dd6 = ToolPage.el('dd'); dd6.textContent = '正弦波，1000 Hz，振幅 = 10000';
    dl2.appendChild(dt6); dl2.appendChild(dd6);
    examplesField.appendChild(dl2);
    card2.appendChild(examplesField);
    body.appendChild(card2);

    // Card 3: filename
    var card3 = ToolPage.formCard();
    var fnInput = document.createElement('input');
    fnInput.type = 'text';
    fnInput.id = 'filename';
    fnInput.value = 'myfile.wav';
    card3.appendChild(ToolPage.field('文件名', null, fnInput));
    body.appendChild(card3);

    body.appendChild(ToolPage.btnGroup([{ text: '生成文件', onclick: CreateFile }]));
  }
});

function CreateFile() {
  var filename = document.getElementById('filename').value;
  var numberOfSamples = parseInt(document.getElementById('numberOfSamples').value);
  if (isNaN(numberOfSamples) || numberOfSamples < 0) {
    showToast("采样点数无效！");
    return;
  }
  var samplingFrequency = parseInt(document.getElementById('samplingFrequency').value);
  if (isNaN(samplingFrequency) || samplingFrequency <= 0 || samplingFrequency > 0xFFFFFFFF) {
    showToast("采样频率值无效！");
    return;
  }
  var bitsPerSample = parseInt(document.getElementById('bitsPerSample').value);
  var numChannels = 1;

  var binary = new Array();
  var pos = 0;

  // "RIFF" chunk descriptor
  binary[pos++] = 'R'.charCodeAt();
  binary[pos++] = 'I'.charCodeAt();
  binary[pos++] = 'F'.charCodeAt();
  binary[pos++] = 'F'.charCodeAt();
  // skip chunksize to be filled later
  var posChunkSize = pos;
  binary[pos++] = 0x00;
  binary[pos++] = 0x00;
  binary[pos++] = 0x00;
  binary[pos++] = 0x00;
  // Format
  binary[pos++] = 'W'.charCodeAt();
  binary[pos++] = 'A'.charCodeAt();
  binary[pos++] = 'V'.charCodeAt();
  binary[pos++] = 'E'.charCodeAt();

  // "fmt ", subchunk 1
  binary[pos++] = 'f'.charCodeAt();
  binary[pos++] = 'm'.charCodeAt();
  binary[pos++] = 't'.charCodeAt();
  binary[pos++] = ' '.charCodeAt();
  // subchunk 1 size
  binary[pos++] = 16; binary[pos++] = 0; binary[pos++] = 0; binary[pos++] = 0;
  // audio format = PCM
  binary[pos++] = 1; binary[pos++] = 0;
  // number of channels
  binary[pos++] = numChannels & 0xFF;
  binary[pos++] = (numChannels & 0xFF00) >> 8;
  // SampleRate
  binary[pos++] = samplingFrequency & 0xFF;
  binary[pos++] = (samplingFrequency & 0xFF00) >> 8;
  binary[pos++] = (samplingFrequency & 0xFF0000) >> 16;
  binary[pos++] = (samplingFrequency & 0xFF000000) >> 24;
  // ByteRate
  var byteRate = samplingFrequency * numChannels * bitsPerSample / 8;
  binary[pos++] = byteRate & 0xFF;
  binary[pos++] = (byteRate & 0xFF00) >> 8;
  binary[pos++] = (byteRate & 0xFF0000) >> 16;
  binary[pos++] = (byteRate & 0xFF000000) >> 24;
  // BlockAlign
  var blockAlign = numChannels * bitsPerSample / 8;
  binary[pos++] = blockAlign & 0xFF;
  binary[pos++] = (blockAlign & 0xFF00) >> 8;
  // bitsPerSample
  binary[pos++] = bitsPerSample & 0xFF;
  binary[pos++] = (bitsPerSample & 0xFF00) >> 8;

  // "data", subchunk 2
  binary[pos++] = 'd'.charCodeAt();
  binary[pos++] = 'a'.charCodeAt();
  binary[pos++] = 't'.charCodeAt();
  binary[pos++] = 'a'.charCodeAt();
  // Subchunk2Size
  var subchunk2Size = numberOfSamples * numChannels * bitsPerSample / 8;
  binary[pos++] = subchunk2Size & 0xFF;
  binary[pos++] = (subchunk2Size & 0xFF00) >> 8;
  binary[pos++] = (subchunk2Size & 0xFF0000) >> 16;
  binary[pos++] = (subchunk2Size & 0xFF000000) >> 24;

  var minInt, maxInt;
  if (bitsPerSample === 16) {
    maxInt = -1 + (1 << 15);
    minInt = -1 << 15;
  } else {
    maxInt = -1 + (1 << 23);
    minInt = -1 << 23;
  }

  var generateFunction = "function generateFn(){ return (" + document.getElementById('formula').value + ");}";
  eval(generateFunction);

  for (var n = 0; n < numberOfSamples; n++) {
    var sampleValue = generateFn();
    if (sampleValue < minInt) sampleValue = minInt;
    else if (sampleValue > maxInt) sampleValue = maxInt;
    if (bitsPerSample === 16) {
      binary[pos++] = sampleValue & 0xFF;
      binary[pos++] = (sampleValue & 0xFF00) >> 8;
    } else {
      binary[pos++] = sampleValue & 0xFF;
      binary[pos++] = (sampleValue & 0xFF00) >> 8;
      binary[pos++] = (sampleValue & 0xFF0000) >> 16;
    }
  }

  // fill correct chunk size
  var chunkSizeVal = pos - 8;
  pos = posChunkSize;
  binary[pos++] = chunkSizeVal & 0xFF;
  binary[pos++] = (chunkSizeVal & 0xFF00) >> 8;
  binary[pos++] = (chunkSizeVal & 0xFF0000) >> 16;
  binary[pos++] = (chunkSizeVal & 0xFF000000) >> 24;

  var byteArray = new Uint8Array(binary);
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([byteArray], { type: 'application/octet-stream' }));
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
</body>
</html>
