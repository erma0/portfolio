<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二进制解码器</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: '二进制解码器',
  desc: '解析和分析二进制数据结构',
  body: function(body) {
    // 输入卡片
    var card1 = ToolPage.formCard();
    card1.appendChild(ToolPage.field('二进制字符串', '除 0 和 1 以外的所有字符均被忽略，因此 "100111" = "10 01 11" = "10, 01, 11" 等。', ToolPage.textareaRow('edInput', { rows: 4 })));
    card1.appendChild(ToolPage.field(null, null, ToolPage.checkbox('chbSeparator', '移除输入中的 "0b" 前缀', true)));
    card1.appendChild(ToolPage.field(null, null, ToolPage.checkbox('chbHexSeparator', '用 "0x" 分隔字节', true)));
    card1.appendChild(ToolPage.btnGroup([
      { text: '转换', onclick: Convert }
    ]));
    body.appendChild(card1);

    // 清理后的输入
    var rc1 = ToolPage.resultCard(null, '清理后的输入');
    rc1.appendChild(ToolPage.inputRow('cleanedBin', { readonly: true }));
    body.appendChild(rc1);

    // 十六进制输出
    var rc2 = ToolPage.resultCard(null, '解码数据（十六进制值）');
    rc2.appendChild(ToolPage.inputRow('hexOutput', { readonly: true }));
    body.appendChild(rc2);

    // ASCII 文本
    var rc3 = ToolPage.resultCard('decodedText', '解码数据（ASCII 文本）');
    var hint = ToolPage.el('span', 'field-hint');
    hint.textContent = '32~126 范围外的字节以斜体显示为 [字节值]';
    rc3.appendChild(hint);
    body.appendChild(rc3);

    // 输出文件卡片
    var card2 = ToolPage.formCard();
    card2.appendChild(ToolPage.field('输出文件名', null, ToolPage.inputRow('filename', { value: 'myfile.dat' })));
    card2.appendChild(ToolPage.btnGroup([
      { text: '转换为文件', onclick: ConvertToFile }
    ]));
    body.appendChild(card2);

    // 逻辑
    function clean_bin(input, remove_0b) {
      input = input.toUpperCase();
      if (remove_0b) {
        input = input.replace(/0B/gi, '');
      }
      var orig_input = input;
      input = input.replace(/[^01]/g, '');
      if (orig_input != input)
        showToast('警告：输入中的非二进制字符已被忽略。');
      return input;
    }

    function Convert() {
      var cleaned_bin = clean_bin(document.getElementById('edInput').value, document.getElementById('chbSeparator').checked);
      document.getElementById('cleanedBin').value = cleaned_bin;
      if (cleaned_bin.length % 8) {
        showToast('错误：清理后的二进制字符串长度不是 8 的整数倍。');
        return;
      }

      var useSeparator = document.getElementById('chbHexSeparator').checked;
      var separator = useSeparator ? ', 0x' : '';
      var hexText = useSeparator ? '0x' : '';

      var binary = [];
      for (var i = 0; i < cleaned_bin.length / 8; i++) {
        var h = cleaned_bin.substr(i * 8, 8);
        binary[i] = parseInt(h, 2);
        hexText += (i !== 0 ? separator : '') + (binary[i] < 16 ? '0' : '') + dec2hex(binary[i]);
      }

      document.getElementById('hexOutput').value = hexText;

      var htmlStr = '';
      for (i = 0; i < binary.length; i++) {
        if (binary[i] >= 32 && binary[i] <= 126) {
          switch (String.fromCharCode(binary[i])) {
            case '&': htmlStr += '&amp;'; break;
            case '<': htmlStr += '&lt;'; break;
            case '>': htmlStr += '&gt;'; break;
            case '"': htmlStr += '&quot;'; break;
            case "'": htmlStr += '&#039;'; break;
            default: htmlStr += String.fromCharCode(binary[i]);
          }
        } else {
          htmlStr += '<i>[' + binary[i] + ']</i>';
        }
      }
      document.getElementById('decodedText').innerHTML = htmlStr;
    }

    function ConvertToFile() {
      Convert();
      createFileFromHex(cleanHex(document.getElementById('hexOutput').value), document.getElementById('filename').value);
    }
  }
});
</script>
</body>
</html>
