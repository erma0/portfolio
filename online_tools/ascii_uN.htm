<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII → u16/u32/u64 十六进制转换器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>ASCII → u16/u32/u64 十六进制转换器</h1>
    <p class="tool-desc">将 ASCII 文本转换为 Unicode 宽字符十六进制数组</p>
  </header>
  <section class="tool-body">
    <div class="form-card">
      <div class="field">
        <label class="field-label" for="inputText">输入文本</label>
        <textarea id="inputText" rows="6" oninput="onInputChange()" placeholder="在此输入要转换的文本…"></textarea>
      </div>
      <div class="field">
        <label class="field-label">选项</label>
        <label style="display:block;margin-bottom:0.4rem;"><input type="checkbox" id="chbSeparator" checked="checked"> 输出添加 0x 前缀及逗号分隔符</label>
        <label style="display:block;margin-bottom:0.4rem;"><input type="checkbox" id="chbBigEndian"> 大端序输出</label>
        <label style="display:block;margin-bottom:0.4rem;"><input type="checkbox" id="chbConvertOnChange"> 输入变化时立即转换</label>
        <label style="display:block;margin-bottom:0.4rem;">32 位值的后缀（例如 UL） <input type="text" id="suffix4B" value="" style="width:4rem;display:inline;"></label>
        <label style="display:block;">64 位值的后缀（例如 ULL） <input type="text" id="suffix8B" value="ULL" style="width:4rem;display:inline;"></label>
      </div>
    </div>
    <div class="btn-group">
      <button type="button" onclick="convert()">转换</button>
    </div>
    <div class="result-card">
      <div class="field">
        <label class="field-label">输出：16 位整数</label>
        <div class="input-row">
          <input type="text" id="hex2B" readonly="readonly" placeholder="16 位十六进制输出">
          <button type="button" class="btn-copy" onclick="copyToClipboard(document.getElementById('hex2B').value)"><script>document.write(ICON_COPY)</script></button>
        </div>
      </div>
    </div>
    <div class="result-card">
      <div class="field">
        <label class="field-label">输出：32 位整数</label>
        <div class="input-row">
          <input type="text" id="hex4B" readonly="readonly" placeholder="32 位十六进制输出">
          <button type="button" class="btn-copy" onclick="copyToClipboard(document.getElementById('hex4B').value)"><script>document.write(ICON_COPY)</script></button>
        </div>
      </div>
    </div>
    <div class="result-card">
      <div class="field">
        <label class="field-label">输出：64 位整数</label>
        <div class="input-row">
          <input type="text" id="hex8B" readonly="readonly" placeholder="64 位十六进制输出">
          <button type="button" class="btn-copy" onclick="copyToClipboard(document.getElementById('hex8B').value)"><script>document.write(ICON_COPY)</script></button>
        </div>
      </div>
    </div>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>
<script>
function convert() {
  var input = document.getElementById('inputText').value;
  var useSep = document.getElementById('chbSeparator').checked;
  var bigEndian = document.getElementById('chbBigEndian').checked;
  var suffix4B = document.getElementById('suffix4B').value;
  var suffix8B = document.getElementById('suffix8B').value;
  var sep1 = useSep ? '0x' : '';
  var sep2 = useSep ? ', ' : '';

  // 16-bit
  if (input.length % 2) {
    document.getElementById('hex2B').value = '无效：字符数为奇数，无法组成 16 位整数';
  } else {
    var hexText = '';
    var i = 0;
    while (i < input.length) {
      hexText += sep1;
      if (bigEndian) {
        for (var j = 0; j < 2; j++) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      } else {
        for (var j = 1; j >= 0; j--) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      }
      hexText += sep2;
      i += 2;
    }
    document.getElementById('hex2B').value = hexText;
  }

  // 32-bit
  if (input.length % 4) {
    document.getElementById('hex4B').value = '无效：字符数不是 4 的整数倍';
  } else {
    var hexText = '';
    var i = 0;
    while (i < input.length) {
      hexText += sep1;
      if (bigEndian) {
        for (var j = 0; j < 4; j++) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      } else {
        for (var j = 3; j >= 0; j--) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      }
      hexText += suffix4B + sep2;
      i += 4;
    }
    document.getElementById('hex4B').value = hexText;
  }

  // 64-bit
  if (input.length % 8) {
    document.getElementById('hex8B').value = '无效：字符数不是 8 的整数倍';
  } else {
    var hexText = '';
    var i = 0;
    while (i < input.length) {
      hexText += sep1;
      if (bigEndian) {
        for (var j = 0; j < 8; j++) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      } else {
        for (var j = 7; j >= 0; j--) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      }
      hexText += suffix8B + sep2;
      i += 8;
    }
    document.getElementById('hex8B').value = hexText;
  }
}

function onInputChange() {
  if (document.getElementById('chbConvertOnChange').checked) {
    convert();
  }
}
</script>
</body>
</html>
