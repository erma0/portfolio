<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII → u16/u32/u64 十六进制转换器</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: 'ASCII → u16/u32/u64 十六进制转换器',
  desc: '将 ASCII 文本转换为 Unicode 宽字符十六进制数组',
  body: function(body) {
    var c1 = ToolPage.formCard();

    // 输入文本
    var ta = document.createElement('textarea');
    ta.id = 'inputText'; ta.rows = 6; ta.placeholder = '在此输入要转换的文本…';
    ta.addEventListener('input', onInputChange);
    c1.appendChild(ToolPage.field('输入文本', null, ta));

    // 选项
    var optField = ToolPage.el('div', 'field');
    var optLabel = ToolPage.el('span', 'field-label');
    optLabel.textContent = '选项';
    optField.appendChild(optLabel);
    optField.appendChild(ToolPage.checkbox('chbSeparator', '输出添加 0x 前缀及逗号分隔符', true));
    optField.appendChild(ToolPage.checkbox('chbBigEndian', '大端序输出', false));
    optField.appendChild(ToolPage.checkbox('chbConvertOnChange', '输入变化时立即转换', false));

    var l1 = document.createElement('label');
    l1.style.cssText = 'display:block;margin-bottom:0.4rem;';
    l1.appendChild(document.createTextNode('32 位值的后缀（例如 UL） '));
    var s4 = document.createElement('input');
    s4.type = 'text'; s4.id = 'suffix4B'; s4.value = '';
    s4.style.cssText = 'width:4rem;display:inline;';
    l1.appendChild(s4);
    optField.appendChild(l1);

    var l2 = document.createElement('label');
    l2.style.cssText = 'display:block;';
    l2.appendChild(document.createTextNode('64 位值的后缀（例如 ULL） '));
    var s8 = document.createElement('input');
    s8.type = 'text'; s8.id = 'suffix8B'; s8.value = 'ULL';
    s8.style.cssText = 'width:4rem;display:inline;';
    l2.appendChild(s8);
    optField.appendChild(l2);

    c1.appendChild(optField);
    body.appendChild(c1);

    // 转换按钮
    body.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: convert }]));

    // 结果
    var rc1 = ToolPage.el('div', 'result-card');
    rc1.appendChild(ToolPage.field('输出：16 位整数', null, ToolPage.inputRow('hex2B', { readonly: true, placeholder: '16 位十六进制输出' })));
    body.appendChild(rc1);

    var rc2 = ToolPage.el('div', 'result-card');
    rc2.appendChild(ToolPage.field('输出：32 位整数', null, ToolPage.inputRow('hex4B', { readonly: true, placeholder: '32 位十六进制输出' })));
    body.appendChild(rc2);

    var rc3 = ToolPage.el('div', 'result-card');
    rc3.appendChild(ToolPage.field('输出：64 位整数', null, ToolPage.inputRow('hex8B', { readonly: true, placeholder: '64 位十六进制输出' })));
    body.appendChild(rc3);
  }
});

function convert() {
  var input = document.getElementById('inputText').value;
  var useSep = document.getElementById('chbSeparator').checked;
  var bigEndian = document.getElementById('chbBigEndian').checked;
  var suffix4B = document.getElementById('suffix4B').value;
  var suffix8B = document.getElementById('suffix8B').value;
  var sep1 = useSep ? '0x' : '';
  var sep2 = useSep ? ', ' : '';

  // 16-bit
  if (input.length % 2) {
    document.getElementById('hex2B').value = '无效：字符数为奇数，无法组成 16 位整数';
  } else {
    var hexText = '';
    var i = 0;
    while (i < input.length) {
      hexText += sep1;
      if (bigEndian) {
        for (var j = 0; j < 2; j++) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      } else {
        for (var j = 1; j >= 0; j--) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      }
      hexText += sep2;
      i += 2;
    }
    document.getElementById('hex2B').value = hexText;
  }

  // 32-bit
  if (input.length % 4) {
    document.getElementById('hex4B').value = '无效：字符数不是 4 的整数倍';
  } else {
    var hexText = '';
    var i = 0;
    while (i < input.length) {
      hexText += sep1;
      if (bigEndian) {
        for (var j = 0; j < 4; j++) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      } else {
        for (var j = 3; j >= 0; j--) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      }
      hexText += suffix4B + sep2;
      i += 4;
    }
    document.getElementById('hex4B').value = hexText;
  }

  // 64-bit
  if (input.length % 8) {
    document.getElementById('hex8B').value = '无效：字符数不是 8 的整数倍';
  } else {
    var hexText = '';
    var i = 0;
    while (i < input.length) {
      hexText += sep1;
      if (bigEndian) {
        for (var j = 0; j < 8; j++) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      } else {
        for (var j = 7; j >= 0; j--) {
          var charVal = input.charCodeAt(i + j);
          hexText += (charVal < 16 ? '0' : '') + dec2hex(charVal);
        }
      }
      hexText += suffix8B + sep2;
      i += 8;
    }
    document.getElementById('hex8B').value = hexText;
  }
}

function onInputChange() {
  if (document.getElementById('chbConvertOnChange').checked) {
    convert();
  }
}
</script>
</body>
</html>
