<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正则表达式测试器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css" />
  <style>
    .test-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .test-row input[type="text"] {
      flex: 1;
      min-width: 0;
    }
    .match-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ink-mute);
      opacity: 0.3;
      flex-shrink: 0;
      transition: background 0.25s ease, opacity 0.25s ease;
    }
    .match-dot.matched {
      background: #2e9e5a;
      opacity: 1;
    }
    .test-row .btn-outline {
      flex-shrink: 0;
      padding: 0.4rem 0.8rem;
      font-size: 0.78rem;
    }
    .ref-table th[colspan="2"] {
      text-align: center;
      letter-spacing: 0.06em;
    }
  </style>
  <script>document.documentElement.className='js'</script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<div class="grain" aria-hidden="true"></div>
<header class="site-header" id="siteHeader" data-nav="tool"></header>
<script src="../nav.js"></script>

<main class="container">
  <header class="tool-header">
    <h1>正则表达式测试器</h1>
    <p class="tool-desc">在线测试和调试正则表达式匹配</p>
  </header>
  <section class="tool-body" id="toolBody"></section>
  <footer class="page-footer">
    <p class="copyright">©鸽子笼 2020-2026</p>
  </footer>
</main>
<script src="./js/utils.js"></script>
<script src="./js/tool-page.js"></script>
<script>
(function() {
  var body = document.getElementById('toolBody');
    // 正则表达式输入
    var card1 = ToolPage.formCard();
    card1.appendChild(ToolPage.field('搜索表达式', '输入正则表达式后自动匹配下方测试文本', function() {
      var input = document.createElement('input');
      input.type = 'text';
      input.id = 'regex-input';
      input.placeholder = '输入正则表达式，如 \\d+';
      return input;
    }()));
    body.appendChild(card1);

    // 测试文本
    var card2 = ToolPage.formCard();
    card2.appendChild(ToolPage.field('测试文本'));
    for (var i = 1; i <= 4; i++) {
      (function(idx) {
        var f = ToolPage.field(null, null, function() {
          var row = ToolPage.el('div', 'test-row');
          var dot = ToolPage.el('span', 'match-dot');
          dot.id = 'dot-' + idx;
          row.appendChild(dot);
          var input = document.createElement('input');
          input.type = 'text';
          input.id = 'test-' + idx;
          input.placeholder = '测试文本 ' + idx;
          row.appendChild(input);
          var btn = ToolPage.el('button', 'btn-outline');
          btn.type = 'button';
          btn.textContent = '显示匹配';
          btn.addEventListener('click', function() { showMatch(idx); });
          row.appendChild(btn);
          return row;
        }());
        card2.appendChild(f);
      })(i);
    }
    body.appendChild(card2);

    // 参考表
    var card3 = ToolPage.el('div', 'result-card');
    var refLabel = ToolPage.el('span', 'field-label');
    refLabel.textContent = '正则表达式基本元素参考';
    card3.appendChild(refLabel);
    var table = document.createElement('table');
    table.className = 'ref-table';
    table.innerHTML =
      '<tr><th colspan="2">字面量（Literals）</th></tr>' +
      '<tr><td>a B G 7 0 @ - = %</td><td>字母和数字，精确匹配</td></tr>' +
      '<tr><td>\\. \\\\ \\$ \\[</td><td>转义特殊字符</td></tr>' +
      '<tr><td>\\n \\r \\t \\十进制码 \\x十六进制码</td><td>不可打印字符</td></tr>' +
      '<tr><th colspan="2">锚点（Anchors）</th></tr>' +
      '<tr><td>^ $</td><td>行首 / 行尾</td></tr>' +
      '<tr><td>\\b</td><td>单词边界</td></tr>' +
      '<tr><td>\\B</td><td>非单词边界</td></tr>' +
      '<tr><th colspan="2">字符组（Character groups）</th></tr>' +
      '<tr><td>.</td><td>任意字符（换行符除外）</td></tr>' +
      '<tr><td>\\d \\D \\s \\S \\w</td><td>十进制数字、非数字、空白、非空白、[a-zA-Z0-9_] 中的字符</td></tr>' +
      '<tr><td>[字符列表]</td><td>列表中的任意字符，如 [0123456789]、[a-zA-Z0-9_]</td></tr>' +
      '<tr><td>[^字符列表]</td><td>列表外的任意字符，如 [^0-9]</td></tr>' +
      '<tr><th colspan="2">数量词（Counts）— 加 ? 变为非贪婪模式</th></tr>' +
      '<tr><td>expr*</td><td>0 次或多次</td></tr>' +
      '<tr><td>expr?</td><td>0 次或 1 次</td></tr>' +
      '<tr><td>expr+</td><td>1 次或多次</td></tr>' +
      '<tr><td>expr{n,m}</td><td>n 到 m 次</td></tr>' +
      '<tr><td>expr{n}</td><td>恰好 n 次</td></tr>' +
      '<tr><td>expr{n,}</td><td>n 次或更多</td></tr>' +
      '<tr><th colspan="2">选择（Alternation）：expr1|expr2</th></tr>';
    card3.appendChild(table);
    body.appendChild(card3);

    // 逻辑
    var regexInput = document.getElementById('regex-input');
    var testInputs = [];
    var dots = [];
    for (var j = 1; j <= 4; j++) {
      testInputs.push(document.getElementById('test-' + j));
      dots.push(document.getElementById('dot-' + j));
    }

    function testMatch() {
      var pattern = regexInput.value;
      var re;
      try {
        re = pattern ? new RegExp(pattern) : null;
      } catch (e) {
        showToast('正则表达式无效：' + e.message);
        for (var i = 0; i < dots.length; i++) {
          dots[i].classList.remove('matched');
        }
        return;
      }
      for (var i = 0; i < testInputs.length; i++) {
        if (re && testInputs[i].value.match(re)) {
          dots[i].classList.add('matched');
        } else {
          dots[i].classList.remove('matched');
        }
      }
    }

    regexInput.addEventListener('input', testMatch);
    for (var k = 0; k < testInputs.length; k++) {
      testInputs[k].addEventListener('input', testMatch);
    }

    window.showMatch = function(index) {
      var pattern = regexInput.value;
      if (!pattern) {
        showToast('请先输入正则表达式');
        return;
      }
      var re;
      try {
        re = new RegExp(pattern);
      } catch (e) {
        showToast('正则表达式无效：' + e.message);
        return;
      }
      var text = testInputs[index - 1].value;
      var m = re.exec(text);
      if (m == null) {
        showToast('未匹配');
      } else {
        var s = '匹配位置：' + m.index;
        for (var i = 0; i < m.length; i++) {
          s += '\n' + m[i];
        }
        showToast(s);
      }
    };
})();
ToolPage.wireCopyButtons();
</script>
<script defer src="../animations.js"></script>
</body>
</html>
