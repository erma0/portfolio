<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>并联电阻搜索工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css" />
  <script>document.documentElement.className='js'</script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<div class="grain" aria-hidden="true"></div>
<header class="site-header" id="siteHeader" data-nav="tool"></header>
<script src="../nav.js"></script>

<main class="container">
  <header class="tool-header">
    <h1>并联电阻搜索工具</h1>
    <p class="tool-desc">搜索两个并联电阻组合以匹配目标等效阻值</p>
  </header>
  <section class="tool-body" id="toolBody"></section>
  <footer class="page-footer">
    <p class="copyright">©鸽子笼 2020-2026</p>
  </footer>
</main>
<script src="./js/utils.js"></script>
<script src="./js/tool-page.js"></script>
<script>
(function() {
  var body = document.getElementById('toolBody');
    var p = ToolPage.el('p');
    p.textContent = '此工具在 E24（5% 精度）电阻系列中搜索两个并联后等效阻值最接近目标值的电阻组合，适合用于替代手头缺少的阻值。精确匹配将被排除——本工具专用于搜索替代方案。';
    body.appendChild(p);

    var card1 = ToolPage.formCard();
    var rInput = document.createElement('input');
    rInput.type = 'text';
    rInput.id = 'equivalentResistance';
    rInput.value = '2300';
    card1.appendChild(ToolPage.field('目标等效阻值（Ω）', null, rInput));

    var rangeField = ToolPage.field('搜索范围');
    var rangeDiv = ToolPage.el('div');
    rangeDiv.style.cssText = 'display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;';
    rangeDiv.appendChild(document.createTextNode('从'));
    rangeDiv.appendChild(ToolPage.select('selectRangeMin', ['0.9', '0.95', '0.97', '0.98', '0.99', '1.00'], '0.98'));
    rangeDiv.appendChild(document.createTextNode('到'));
    rangeDiv.appendChild(ToolPage.select('selectRangeMax', ['1.00', '1.01', '1.02', '1.03', '1.05', '1.1'], '1.02'));
    rangeDiv.appendChild(document.createTextNode('倍目标阻值'));
    rangeField.appendChild(rangeDiv);
    card1.appendChild(rangeField);
    body.appendChild(card1);

    body.appendChild(ToolPage.btnGroup([{ text: '搜索电阻组合', onclick: Execute }]));

    var rc = ToolPage.el('div', 'result-card');
    rc.id = 'divOutput';
    var defaultMsg = ToolPage.el('span', 'result-value');
    defaultMsg.style.color = 'var(--ink-mute)';
    defaultMsg.textContent = '点击"搜索电阻组合"查看结果';
    rc.appendChild(defaultMsg);
    body.appendChild(rc);
})();

var E24_set = [1.0, 1.1, 1.2, 1.3, 1.5, 1.6, 1.8, 2.0, 2.2, 2.4, 2.7, 3.0, 3.3, 3.6, 3.9, 4.3, 4.7, 5.1, 5.6, 6.2, 6.8, 7.5, 8.2, 9.1];

function getNextResistor(resistance) {
  var order = 0;
  var mantissa = resistance * 1.000001;
  if (resistance >= 1) {
    while (mantissa >= 10) { mantissa /= 10; order++; }
  } else {
    while (mantissa < 1) { mantissa *= 10; order--; }
  }
  var higherMantissa = E24_set[0];
  var higherMantissaFound = false;
  for (var i = 0; i < E24_set.length; i++) {
    higherMantissa = E24_set[i];
    if (higherMantissa > mantissa) {
      higherMantissaFound = true;
      break;
    }
  }
  if (!higherMantissaFound) {
    order++;
    higherMantissa = E24_set[0];
  }
  return (higherMantissa * Math.pow(10, order));
}

function Execute() {
  var resistance = parseFloat(document.getElementById('equivalentResistance').value);
  if (isNaN(resistance)) {
    showToast("阻值无效");
    return;
  }
  if (resistance <= 0) {
    showToast("阻值必须大于零");
    return;
  }

  var resArray = [];
  var R2, rEquivalent;
  var rangeMin = parseFloat(document.getElementById('selectRangeMin').value);
  var rangeMax = parseFloat(document.getElementById('selectRangeMax').value);

  var R1 = getNextResistor(resistance);
  while (R1 <= 2 * resistance) {
    R2 = R1;
    while (R2 < 30 * resistance) {
      rEquivalent = (R1 * R2) / (R1 + R2);
      if (rEquivalent >= rangeMin * resistance && rEquivalent <= rangeMax * resistance) {
        resArray.push({"R1": R1, "R2": R2, "rEquivalent": rEquivalent});
      }
      R2 = getNextResistor(R2);
    }
    R1 = getNextResistor(R1);
  }

  var htmlVal = "<span class='field-label'>推荐电阻组合</span>";
  htmlVal += "<table>";
  htmlVal += "<tr><th>R1 (Ω)</th><th>R2 (Ω)</th><th>等效阻值 (Ω)</th><th>误差</th></tr>";
  resArray.forEach(function(res) {
    htmlVal += "<tr><td>" + parseFloat(res.R1.toPrecision(6)) + "</td><td>" + parseFloat(res.R2.toPrecision(6)) + "</td><td>" + res.rEquivalent.toPrecision(6) + "</td><td>" + (100 * (res.rEquivalent - resistance) / resistance).toFixed(2) + "%</td></tr>";
  });
  htmlVal += "</table>";

  if (resArray.length === 0) {
    htmlVal = "<span class='result-value' style='color: var(--ink-mute);'>未找到符合条件的电阻组合，请尝试放宽搜索范围</span>";
  }

  document.getElementById('divOutput').innerHTML = htmlVal;
}
ToolPage.wireCopyButtons();
</script>
<script defer src="../animations.js"></script>
</body>
</html>
