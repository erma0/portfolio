<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++ 字符串 → 文本反转义工具</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: 'C++ 字符串 → 文本反转义工具',
  desc: '将 C/C++ 字符串字面量中的转义序列还原为原始文本',
  body: function(body) {
    // 输入
    var card1 = ToolPage.formCard();
    card1.appendChild(ToolPage.field('C/C++ 字符串字面量', '输入 C/C++ 风格的字符串字面量，如 "Hello\\nWorld"', ToolPage.textareaRow('ed_input', { rows: 10 })));
    body.appendChild(card1);

    // 按钮
    body.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: doConvert }]));

    // 输出
    var card3 = ToolPage.el('div', 'result-card');
    card3.appendChild(ToolPage.field('反转义文本', null, ToolPage.textareaRow('ed_output', { rows: 10, readonly: true })));
    body.appendChild(card3);

    function showErrorInfo(text, pos) {
      showToast('错误：' + text + ' 位置（源码偏移）：' + pos);
    }

    function cstr_decode(input) {
      var output = '';
      var OPENING = 0, STRING = 1, ESCAPING = 2;
      var state = OPENING;

      for (var i = 0; i < input.length; i++) {
        switch (state) {
          case OPENING:
            switch (input[i]) {
              case ' ':
              case '\f':
              case '\n':
              case '\r':
              case '\t':
              case '\v':
                break;
              case '"':
                state = STRING;
                break;
              default:
                if (i !== input.length - 1) {
                  showErrorInfo('意外字符 (' + input[i] + ')，期望引号', i);
                  return output;
                } else {
                  showErrorInfo('意外字符 (' + input[i] + ')，转换中断', i);
                  break;
                }
            }
            break;

          case STRING:
            switch (input[i]) {
              case '\f':
              case '\n':
              case '\r':
              case '\t':
                break;
              case '"':
                state = OPENING;
                break;
              case '\\':
                state = ESCAPING;
                break;
              default:
                output += input[i];
                break;
            }
            break;

          case ESCAPING:
            switch (input[i]) {
              case 'f':
                output += '\f';
                break;
              case 'n':
                output += '\n';
                break;
              case 'r':
                output += '\r';
                break;
              case 't':
                output += '\t';
                break;
              case '"':
                output += '"';
                break;
              case '\\':
                output += '\\';
                break;
              default:
                showErrorInfo('意外字符 (' + input[i] + ')，期望转义字符 (f, n, r, t, \\, 引号)', i);
                return output;
            }
            state = STRING;
            break;
        }
      }

      if (state !== OPENING) {
        showErrorInfo('源字符串未正确终止', i);
      }
      return output;
    }

    function doConvert() {
      document.getElementById('ed_output').value = cstr_decode(document.getElementById('ed_input').value);
    }
  }
});
</script>
</body>
</html>
