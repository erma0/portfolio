<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件 → Base64 编码器</title>
  <link rel="stylesheet" href="./css/tool.css">

</head>
<body>
<div id="bg"></div>
<main class="container">
  <nav class="top-nav">
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>文件 → Base64 编码器</h1>
    <p class="tool-desc">将本地文件编码为 Base64 字符串（纯客户端）</p>
  </header>
  <section class="tool-body">

<p>客户端处理（JavaScript，数据不会上传服务器）。将本地文件转换为 Base64 字符串。
		注意：文件大于 1MB 时可能导致资源消耗过高（如 Chromium 46 加载数 MB 的文本到 textarea 时有明显问题），大文件建议使用离线工具。
	  </p>
	  <form name="frmConvert" action="">
        <p>选项：</p>
          <p>
			<input type="checkbox" name="chbNewline" value="newline">将输出拆分为多行
		  </p>
		<p>
		选择文件：
		<input type="file" name="fileinput" onchange='openFile(event)' /> 或
        <span id="drop_zone" ondrop="drop_handler(event);" ondragover="dragover_handler(event);" ondragend="dragend_handler(event);">
          <strong>拖放文件至此</strong>
        </span>       
		</p>        

			  </p>		  
				<p>输出（Base64）：</p>
			    <p>
				<textarea name="ed_output" rows="5" cols="87" style="width: 700px;"></textarea>				
                <br>
                <br>
                <button type="button" name="btnCopyOutputToClipboard" onclick="copyOutputToClipboard()">复制到剪贴板</button>
				</p>			    
			</form>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>
</body>
</html>
