<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件 → Base64 编码器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css" />
  <script>document.documentElement.className='js'</script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<div class="grain" aria-hidden="true"></div>
<header class="site-header" id="siteHeader" data-nav="tool"></header>
<script src="../nav.js"></script>

<main class="container">
  <header class="tool-header">
    <h1>文件 → Base64 编码器</h1>
    <p class="tool-desc">将本地文件编码为 Base64 字符串（纯客户端）</p>
  </header>
  <section class="tool-body" id="toolBody"></section>
  <footer class="page-footer">
    <p class="copyright">©鸽子笼 2020-2026</p>
  </footer>
</main>
<script src="./js/utils.js"></script>
<script src="./js/tool-page.js"></script>
<script>
(function() {
  var body = document.getElementById('toolBody');
    var p = ToolPage.el('p');
    p.textContent = '客户端处理（JavaScript，数据不会上传服务器）。将本地文件转换为 Base64 字符串。注意：文件大于 1MB 时可能导致资源消耗过高，大文件建议使用离线工具。';
    body.appendChild(p);

    // 选项卡片
    var card1 = ToolPage.formCard();
    var optField = ToolPage.field('选项');
    optField.appendChild(ToolPage.checkbox('chbNewline', '将输出拆分为多行', false));
    card1.appendChild(optField);
    body.appendChild(card1);

    // 文件选择卡片
    var card2 = ToolPage.formCard();
    card2.appendChild(ToolPage.fileField('fileInput', '选择文件'));
    var dzField = ToolPage.field();
    dzField.appendChild(ToolPage.dropZone('dropZone', '📁 拖放文件至此'));
    card2.appendChild(dzField);
    body.appendChild(card2);

    // 结果卡片
    var card3 = ToolPage.resultCard(null, 'Base64 输出');
    var ta = document.createElement('textarea');
    ta.id = 'edOutput';
    ta.rows = 5;
    ta.readOnly = true;
    card3.appendChild(ta);
    card3.appendChild(ToolPage.btnGroup([
      { text: '复制到剪贴板', onclick: function() { copyToClipboard(document.getElementById('edOutput').value); } }
    ]));
    body.appendChild(card3);

    // 逻辑
    function processFile(data) {
      var b64 = base64Encode(data);
      if (document.getElementById('chbNewline').checked) {
        b64 = b64.match(/.{1,76}/g).join('\n');
      }
      document.getElementById('edOutput').value = b64;
    }

    document.getElementById('fileInput').addEventListener('change', function(event) {
      openFile(event, function(result) {
        processFile(result.data);
      });
    });

    // 拖放
    var dz = document.getElementById('dropZone');
    dz.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.stopPropagation();
      dz.classList.add('drag-over');
    });
    dz.addEventListener('dragleave', function(e) {
      e.preventDefault();
      e.stopPropagation();
      dz.classList.remove('drag-over');
    });
    dz.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      dz.classList.remove('drag-over');
      var file = e.dataTransfer.files && e.dataTransfer.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        processFile(new Uint8Array(ev.target.result));
      };
      reader.readAsArrayBuffer(file);
    });
})();
ToolPage.wireCopyButtons();
</script>
<script defer src="../animations.js"></script>
</body>
</html>
