<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base32 ↔ 十六进制</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: 'Base32 ↔ 十六进制',
  desc: '在线 Base32 与十六进制字符串互转工具',
  body: function(body) {

    /* ====== Base32 → 十六进制 ====== */
    var card1 = ToolPage.formCard();
    card1.appendChild(ToolPage.field('Base32 字符串', null, ToolPage.inputRow('b32tohex_input')));

    var opts1 = ToolPage.field('选项');
    opts1.appendChild(ToolPage.checkbox('b32tohex_chbSep', '输出添加 0x 前缀'));
    opts1.appendChild(ToolPage.checkbox('b32tohex_chbLower', '使用小写十六进制字符'));
    card1.appendChild(opts1);

    card1.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: b32ToHexConvert }]));
    body.appendChild(card1);

    // 输出区域
    var resultCard1 = ToolPage.el('div', 'result-card');
    resultCard1.id = 'b32tohex_result_card';
    resultCard1.style.display = 'none';
    resultCard1.appendChild(ToolPage.field('解码数据（十六进制）', null, ToolPage.inputRow('b32tohex_hex', { readonly: true })));

    var asciiField = ToolPage.field('解码数据（ASCII 文本）', '32~126 范围外的字节以斜体显示为 [byte value]');
    var asciiDiv = ToolPage.el('div', 'result-value');
    asciiDiv.id = 'b32tohex_decoded_text';
    asciiDiv.style.marginTop = '0.4rem';
    asciiField.appendChild(asciiDiv);
    resultCard1.appendChild(asciiField);
    body.appendChild(resultCard1);

    body.appendChild(ToolPage.divider());

    /* ====== 十六进制 → Base32 ====== */
    var card2 = ToolPage.formCard();
    card2.appendChild(ToolPage.field('十六进制字符串', '所有非十六进制字符将被忽略，"12AB34" = "12 AB 34" = "12, AB, 34" 等。输入不区分大小写。', ToolPage.inputRow('h2b32_hex')));

    var opts2 = ToolPage.field('选项');
    opts2.appendChild(ToolPage.checkbox('h2b32_chbSep', '移除输入中的 "0x" 前缀', true));
    card2.appendChild(opts2);

    card2.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: hexToB32Convert }]));
    body.appendChild(card2);

    // 输出区域
    var resultCard2 = ToolPage.el('div', 'result-card');
    resultCard2.id = 'h2b32_result_card';
    resultCard2.style.display = 'none';
    resultCard2.appendChild(ToolPage.field('清理后的输入', null, ToolPage.inputRow('h2b32_cleaned_hex', { readonly: true })));
    resultCard2.appendChild(ToolPage.field('输出（Base32）', null, ToolPage.inputRow('h2b32_base32', { readonly: true })));
    body.appendChild(resultCard2);

    var linkP = ToolPage.el('p');
    linkP.innerHTML = '相关工具：<a href="hex_to_base32_multi.htm">批量十六进制 → Base32 转换器</a>';
    body.appendChild(linkP);
  }
});

/* ---- Base32 → 十六进制 ---- */
function b32ToHexConvert() {
  var input = document.getElementById('b32tohex_input').value;
  var bytes = base32Decode(input);

  var useSeparator = document.getElementById('b32tohex_chbSep').checked;
  var useLowercase = document.getElementById('b32tohex_chbLower').checked;
  var separator = useSeparator ? ' 0x' : '';
  var hexText = bytes2hex(bytes, separator, useLowercase);
  document.getElementById('b32tohex_hex').value = hexText;

  var htmlStr = '';
  for (var i = 0; i < bytes.length; i++) {
    if (bytes[i] >= 32 && bytes[i] <= 126) {
      var ch = String.fromCharCode(bytes[i]);
      switch (ch) {
        case '&': htmlStr += '&amp;'; break;
        case '<': htmlStr += '&lt;'; break;
        case '>': htmlStr += '&gt;'; break;
        case '"': htmlStr += '&quot;'; break;
        case "'": htmlStr += '&#039;'; break;
        default: htmlStr += ch;
      }
    } else {
      htmlStr += '<i>[' + bytes[i] + ']</i>';
    }
  }
  document.getElementById('b32tohex_decoded_text').innerHTML = htmlStr;
  document.getElementById('b32tohex_result_card').style.display = '';
}

/* ---- 十六进制 → Base32 ---- */
function hexToB32Convert() {
  var cleaned_hex = cleanHex(document.getElementById('h2b32_hex').value, document.getElementById('h2b32_chbSep').checked);
  document.getElementById('h2b32_cleaned_hex').value = cleaned_hex;
  if (cleaned_hex.length % 2) {
    showToast('错误：清理后的十六进制字符串长度为奇数。');
    document.getElementById('h2b32_base32').value = '';
    document.getElementById('h2b32_result_card').style.display = '';
    return;
  }
  var bytes = hex2bytes(cleaned_hex);
  document.getElementById('h2b32_base32').value = base32Encode(bytes);
  document.getElementById('h2b32_result_card').style.display = '';
}
</script>
</body>
</html>
