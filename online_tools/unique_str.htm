<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>去重 / 排序工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css" />
  <script>document.documentElement.className='js'</script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<div class="grain" aria-hidden="true"></div>
<header class="site-header" id="siteHeader" data-nav="tool"></header>
<script src="../nav.js"></script>

<main class="container">
  <header class="tool-header">
    <h1>去重 / 排序工具</h1>
    <p class="tool-desc">对文本行进行去重、排序或统计操作</p>
  </header>
  <section class="tool-body" id="toolBody"></section>
  <footer class="page-footer">
    <p class="copyright">©鸽子笼 2020-2026</p>
  </footer>
</main>
<script src="./js/utils.js"></script>
<script src="./js/tool-page.js"></script>
<script>
(function() {
  var body = document.getElementById('toolBody');
    // 源字符串输入
    var card1 = ToolPage.formCard();
    card1.appendChild(ToolPage.field('源字符串', '每行一个字符串', ToolPage.textareaRow('ed_input', { rows: 12 })));
    body.appendChild(card1);

    // 选项
    var card2 = ToolPage.formCard();
    card2.appendChild(ToolPage.field('选项', null, function() {
      var wrap = ToolPage.el('div');
      wrap.appendChild(ToolPage.checkbox('chbTrimStrings', '自动去除源字符串首尾空白', true));
      wrap.appendChild(ToolPage.el('br'));
      wrap.appendChild(ToolPage.checkbox('chbSkipEmptyStrings', '跳过空字符串', true));
      wrap.appendChild(ToolPage.el('br'));
      wrap.appendChild(ToolPage.checkbox('chbRemoveDuplicatedStrings', '去除重复字符串', true));
      wrap.appendChild(ToolPage.el('br'));
      wrap.appendChild(ToolPage.checkbox('chbSortStrings', '对字符串排序', true));
      return wrap;
    }()));
    body.appendChild(card2);

    // 按钮
    body.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: doConvert }]));

    // 输出
    var card3 = ToolPage.el('div', 'result-card');
    card3.appendChild(ToolPage.field('输出字符串', null, ToolPage.textareaRow('ed_output', { rows: 12, readonly: true })));
    body.appendChild(card3);

    function doConvert() {
      var input = document.getElementById('ed_input').value;
      var trimStrings = document.getElementById('chbTrimStrings').checked;
      var skipEmptyStrings = document.getElementById('chbSkipEmptyStrings').checked;
      var removeDuplicatedStrings = document.getElementById('chbRemoveDuplicatedStrings').checked;
      var sortStrings = document.getElementById('chbSortStrings').checked;

      var lines = input.split('\n');
      var filteredLines = [];
      for (var i = 0; i < lines.length; i++) {
        var line;
        if (trimStrings) {
          line = lines[i].trim();
        } else {
          line = lines[i];
        }
        if (skipEmptyStrings) {
          if (line === '') {
            continue;
          }
        }
        if (removeDuplicatedStrings) {
          if (filteredLines.indexOf(line) < 0) {
            filteredLines.push(line);
          }
        } else {
          filteredLines.push(line);
        }
      }
      if (sortStrings) {
        filteredLines.sort();
      }
      var output = '';
      if (filteredLines.length) {
        output = filteredLines[0];
      }
      for (var j = 1; j < filteredLines.length; j++) {
        output += '\r\n' + filteredLines[j];
      }

      document.getElementById('ed_output').value = output;
    }
})();
ToolPage.wireCopyButtons();
</script>
<script defer src="../animations.js"></script>
</body>
</html>
