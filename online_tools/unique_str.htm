<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>去重 / 排序工具</title>
  <link rel="stylesheet" href="./css/tool.css">

</head>
<body>
<div id="bg"></div>
<main class="container">
  <nav class="top-nav">
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>去重 / 排序工具</h1>
    <p class="tool-desc">对文本行进行去重、排序或统计操作</p>
  </header>
  <section class="tool-body">
<script type="text/javascript">
//<!--

function insertAtCursor(myField, myValue)
    {
    //IE support
    if (document.selection) 
        {
        myField.focus();
        sel = document.selection.createRange();
        sel.text = myValue;
        }
    
    //MOZILLA/NETSCAPE support
    else if (myField.selectionStart || myField.selectionStart == '0') 
        {
        var startPos = myField.selectionStart;
        var endPos = myField.selectionEnd;
        restoreTop = myField.scrollTop;
        
        myField.value = myField.value.substring(0, startPos) + myValue + myField.value.substring(endPos, myField.value.length);
        
        myField.selectionStart = startPos + myValue.length; 
        myField.selectionEnd = startPos + myValue.length;
        
        if (restoreTop>0)
            {
            myField.scrollTop = restoreTop;
            }
        } 
    else 
        {
        myField.value += myValue;
        }
    }

    function interceptTabs(evt, control)
        {
        key = evt.keyCode ? evt.keyCode : evt.which ? evt.which : evt.charCode;
        if (key==9)
            {
            insertAtCursor(control, '\t');
            return false; 
            }
        else
            {
            return key;
            }
        }

            function Convert() {
                var input = document.frmConvert.ed_input.value;
                var trimStrings = document.frmConvert.chbTrimStrings.checked;
                var skipEmptyStrings = document.frmConvert.chbSkipEmptyStrings.checked;
                var removeDuplicatedStrings = document.frmConvert.chbRemoveDuplicatedStrings.checked;
                var sortStrings = document.frmConvert.chb排序Strings.checked;

                var lines = input.split('\n');
                var filteredLines = [];
                for(var i = 0;i < lines.length; i++){
                    var line;
                    if (trimStrings) {
                        line = lines[i].trim();
                    } else {
                        line = lines[i];
                    }
                    if (skipEmptyStrings) {
                        if (line === '') {
                            continue;
                        }
                    }
                    if (removeDuplicatedStrings) {
                        if (filteredLines.indexOf(line) < 0) {
                            filteredLines.push(line);
                        }
                    } else {
                        filteredLines.push(line);
                    }
                }
                if (sortStrings) {
                    filteredLines.sort();
                }
                var output = "";
                if (filteredLines.length) {
                    output = filteredLines[0];
                }
                for (var i=1; i<filteredLines.length; i++) {
                    output += "\r\n" + filteredLines[i];
                }

                document.frmConvert.ed_output.value = output;
            }

//-->
</script>
<form name="frmConvert" action="./cpp_text_escape.htm">
                <p>源字符串（每行一个）：</p>
                <p>
                    <textarea onkeydown="return interceptTabs(event, this);" name="ed_input" rows="12" cols="67" style="width: 550px;"></textarea>
                </p>
                <p>选项：</p>
                <p>
                    <input type="checkbox" name="chbTrimStrings" value="" checked="yes">自动去除源字符串首尾空白
                    <br>
                    <input type="checkbox" name="chbSkipEmptyStrings" value="" checked="yes">跳过空字符串
                    <br>
                    <input type="checkbox" name="chbRemoveDuplicatedStrings" value="" checked="yes">去除重复字符串
                    <br>                    
                    <input type="checkbox" name="chb排序Strings" value="" checked="yes">对字符串排序
                    <br>                    
                </p>
                <p>
                    <button type="button" name="btnConvert" onclick="Convert()">
                        转换
                    </button>
                </p>
                <p>输出字符串：</p>
                <p>
                    <textarea name="ed_output" rows="12" cols="67" style="width: 550px;"></textarea>
                </p>
            </form>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>
</body>
</html>
