<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD5 哈希计算器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
  <script src="./js/md5.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<div id="bg"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>MD5 哈希计算器</h1>
    <p class="tool-desc">在线计算文本或文件的 MD5 哈希值</p>
  </header>
  <section class="tool-body">

<p>此计算器用于计算挑战-握手认证（CHAP）等认证方案所需的 MD5 摘要。
可多次更新 MD5 状态，每次可将输入视为文本或十六进制缓冲区（例如将 salt/nonce 视为二进制，将密码视为文本）。</p>

<script>
function showToast(msg){var t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 24px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s';document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1'});setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove()},300)},2500)}
let initialized = false;

function md5Init() {
    md5_init();
    document.frmCalc.output.value = '';
    initialized = true;
}

function md5UpdateText() {
    if (!initialized) md5Init();
    const input = document.frmCalc.input.value;
    for (let i = 0; i < input.length; i++) {
        md5_update(input.charCodeAt(i));
    }
}

function md5UpdateHex() {
    if (!initialized) md5Init();
    const input = document.frmCalc.input.value.toUpperCase();

    // 验证十六进制格式
    if (!isValidHex(input)) {
        showToast("错误：包含非十六进制字符");
        return;
    }
    if (!isEvenHexLength(input)) {
        showToast("错误：十六进制长度不是 2 的整数倍");
        return;
    }

    for (let i = 0; i < input.length; i += 2) {
        md5_update(hex2dec(input.substr(i, 2)));
    }
}

function md5Finish() {
    initialized = false;
    md5_finish();
    let out = '';
    for (let i = 0; i < digestBits.length; i++) {
        out += (digestBits[i] < 16 ? '0' : '') + dec2hex(digestBits[i], false);
    }
    document.frmCalc.output.value = out;
}
</script>

<form name="frmCalc" action="">
  <p><button type="button" onclick="md5Init()">重新初始化（md5_init）</button></p>

  <p><label for="md5Input">输入：</label></p>
  <p>
    <input type="text" name="input" id="md5Input" value="">
    <br>
    <button type="button" onclick="md5UpdateText()">以文本方式更新（md5_update）</button>
    <button type="button" onclick="md5UpdateHex()">以十六进制方式更新（md5_update）</button>
  </p>

  <p><button type="button" onclick="md5Finish()">完成计算 / 获取结果（md5_finish）</button></p>

  <p><label for="md5Output">输出 MD5：</label></p>
  <p><input type="text" name="output" id="md5Output" value="" readonly><button type="button" onclick="copyToClipboard(this.previousElementSibling.value)">复制</button></p>
</form>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>
</body>
</html>
