<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>位反转工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>

</head>
<body>
<div class="grain" aria-hidden="true"></div>
<div id="bg"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>位反转工具</h1>
    <p class="tool-desc">对十六进制数据执行按位取反操作</p>
  </header>
  <section class="tool-body">
<script type="text/javascript">
//<!--
      function showToast(msg){var t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 24px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s';document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1'});setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove()},300)},2500)}


      function ShowDecodedAsText(val) {
        var target = document.getElementById('divDecodedText');
        target.innerHTML = val;
      }

      function Convert() {
        var cleaned_hex = cleanHex(document.frmConvert.hex.value, document.frmConvert.chbSeparator.checked);
        document.frmConvert.cleaned_hex.value = cleaned_hex;
        if (cleaned_hex.length % 2) {
          showToast("错误：十六进制长度为奇数");
          return;
        }

        var binary = new Array();
        for (var i = 0; i < cleaned_hex.length / 2; i++) {
          var h = cleaned_hex.substr(i * 2, 2);
          binary[i] = 255 - parseInt(h, 16);
        }

        var output = binary;

        var outputSeparator = document.frmConvert.chbOutputSeparator.checked;

        var htmlStr = "<p style=\"font-family: courier new, monospace\"><b>";
        var hexStr = "";
        for (i = 0; i < output.length; i++) {
          if (outputSeparator) {
            if (hexStr.length) {
              hexStr += ", 0x";
            } else {
              hexStr += "0x";
            }
          }
          if (output[i] < 16) {
            hexStr += "0"; // leading zero
          }
          hexStr += output[i].toString(16).toUpperCase();

          if (output[i] >= 32 && output[i] <= 126) {
            switch (String.fromCharCode(output[i])) {
              case '&':
                htmlStr += "&amp;";
                break;
              case '<':
                htmlStr += "&lt;";
                break;
              case '>':
                htmlStr += "&gt;";
                break;
              case '"':
                htmlStr += "&quot;";
                break;
              case '\'':
                htmlStr += "&#039;";
                break;
              default:
                htmlStr += String.fromCharCode(output[i]);
            }
          } else {
            htmlStr += "<i>[" + output[i] + "]<" + "/i>";
          }
        }
        htmlStr += "<" + "/b><" + "/p>"; // stupid W3C validator...
        //document.frmConvert.hex.value = hexText;

        document.frmConvert.output_hex.value = hexStr;;

        ShowDecodedAsText(htmlStr);

      }

      //-->
</script>
<form name="frmConvert" action="">
        <p>十六进制字符串：</p>
        <p><input type="text" name="hex" value="" style="font-family: monospace;"></p>
        <p>注意：十六进制集合以外的字符将被忽略，因此 "12AB34" = "12 AB 34" = "12, AB, 34" 等价。
          输入不区分大小写。</p>
        <p>选项：</p>
        <p>
          <input type="checkbox" name="chbSeparator" value="sep" checked="checked">移除输入中的 "0x" 前缀
          <br>
          <input type="checkbox" name="chbOutputSeparator" value="sepOutput">输出使用 "0x" 前缀及逗号分隔
        </p>
        <p>清理后的输入：</p>
        <p><input type="text" name="cleaned_hex" readonly="readonly" value=""
            style="font-family: monospace;"><button type="button" onclick="copyToClipboard(this.previousElementSibling.value)">复制</button></p>
        <br>
        <p>反转后的字节：</p>
        <p><input type="text" name="output_hex" readonly="readonly" value=""
            style="font-family: monospace;"><button type="button" onclick="copyToClipboard(this.previousElementSibling.value)">复制</button></p>

        <p>以 ASCII 文本形式输出数据，32~126 范围外的字节以斜体显示为 <i>[字节值]</i>：<br>
          <div id="divDecodedText">
            <p><i>（解码后的文本将显示在此处）</i></p>
          </div>
          <p>
            <button type=button name="btnConvert" onclick="Convert()">
              转换
            </button>
          </p>
      </form>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>
</body>
</html>
