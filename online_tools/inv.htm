<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>位反转工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>位反转工具</h1>
    <p class="tool-desc">对十六进制数据执行按位取反操作（NOT）</p>
  </header>
  <section class="tool-body">

    <div class="form-card">
      <div class="field">
        <label class="field-label" for="inputHex">十六进制字符串</label>
        <input type="text" id="inputHex" value="">
        <span class="field-hint">十六进制集合以外的字符将被忽略，因此 "12AB34" = "12 AB 34" = "12, AB, 34" 等价，输入不区分大小写。</span>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="chkRemove0x" checked="checked">
          移除输入中的 "0x" 前缀
        </label>
      </div>

      <div class="field">
        <label>
          <input type="checkbox" id="chkOutput0x">
          输出使用 "0x" 前缀及逗号分隔
        </label>
      </div>
    </div>

    <div class="btn-group">
      <button type="button" onclick="Convert()">转换</button>
    </div>

    <div class="result-card">
      <div class="field">
        <span class="field-label">清理后的输入</span>
        <div class="input-row">
          <input type="text" id="outputCleaned" readonly="readonly" value="">
          <button type="button" class="btn-copy" id="btnCopyCleaned" onclick="copyToClipboard(document.getElementById('outputCleaned').value)"></button>
        </div>
      </div>

      <div class="field">
        <span class="field-label">反转后的字节</span>
        <div class="input-row">
          <input type="text" id="outputHex" readonly="readonly" value="">
          <button type="button" class="btn-copy" id="btnCopyHex" onclick="copyToClipboard(document.getElementById('outputHex').value)"></button>
        </div>
      </div>

      <div class="field">
        <span class="field-label">ASCII 文本</span>
        <span class="field-hint">32~126 范围外的字节以斜体显示为 [字节值]</span>
        <div class="result-value" id="outputAscii"><i>（解码后的文本将显示在此处）</i></div>
      </div>
    </div>

  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>

<script type="text/javascript">
function Convert() {
  var remove0x = document.getElementById('chkRemove0x').checked;
  var cleaned_hex = cleanHex(document.getElementById('inputHex').value, remove0x);
  document.getElementById('outputCleaned').value = cleaned_hex;

  if (cleaned_hex.length % 2) {
    showToast('错误：十六进制长度为奇数');
    return;
  }

  var binary = [];
  for (var i = 0; i < cleaned_hex.length / 2; i++) {
    var h = cleaned_hex.substr(i * 2, 2);
    binary[i] = 255 - parseInt(h, 16);
  }

  var outputSeparator = document.getElementById('chkOutput0x').checked;

  var hexStr = '';
  for (var i = 0; i < binary.length; i++) {
    if (outputSeparator) {
      hexStr += (hexStr.length ? ', 0x' : '0x');
    }
    if (binary[i] < 16) {
      hexStr += '0';
    }
    hexStr += binary[i].toString(16).toUpperCase();
  }
  document.getElementById('outputHex').value = hexStr;

  var htmlStr = '<b>';
  for (var i = 0; i < binary.length; i++) {
    if (binary[i] >= 32 && binary[i] <= 126) {
      switch (String.fromCharCode(binary[i])) {
        case '&':  htmlStr += '&amp;'; break;
        case '<':  htmlStr += '&lt;'; break;
        case '>':  htmlStr += '&gt;'; break;
        case '"':  htmlStr += '&quot;'; break;
        case '\'': htmlStr += '&#039;'; break;
        default:   htmlStr += String.fromCharCode(binary[i]);
      }
    } else {
      htmlStr += '<i>[' + binary[i] + ']</i>';
    }
  }
  htmlStr += '</b>';
  document.getElementById('outputAscii').innerHTML = htmlStr;
}

document.getElementById('btnCopyCleaned').innerHTML = ICON_COPY;
document.getElementById('btnCopyHex').innerHTML = ICON_COPY;
</script>
</body>
</html>
