<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>位反转工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css" />
  <script>document.documentElement.className='js'</script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<div class="grain" aria-hidden="true"></div>
<header class="site-header" id="siteHeader" data-nav="tool"></header>
<script src="../nav.js"></script>

<main class="container">
  <header class="tool-header">
    <h1>位反转工具</h1>
    <p class="tool-desc">对十六进制数据执行按位取反操作（NOT）</p>
  </header>
  <section class="tool-body" id="toolBody"></section>
  <footer class="page-footer">
    <p class="copyright">©鸽子笼 2020-2026</p>
  </footer>
</main>
<script src="./js/utils.js"></script>
<script src="./js/tool-page.js"></script>
<script>
(function() {
  var body = document.getElementById('toolBody');
  var card1 = ToolPage.formCard();
  card1.appendChild(ToolPage.field('十六进制字符串', '十六进制集合以外的字符将被忽略，因此 "12AB34" = "12 AB 34" = "12, AB, 34" 等价，输入不区分大小写。', ToolPage.inputRow('inputHex')));
  card1.appendChild(ToolPage.field(null, null, ToolPage.checkbox('chkRemove0x', '移除输入中的 "0x" 前缀', true)));
  card1.appendChild(ToolPage.field(null, null, ToolPage.checkbox('chkOutput0x', '输出使用 "0x" 前缀及逗号分隔', false)));
  body.appendChild(card1);

  body.appendChild(ToolPage.btnGroup([{text: '转换', onclick: Convert}]));

  var result = ToolPage.resultCard('resultArea', null);
  result.appendChild(ToolPage.field('清理后的输入', null, ToolPage.inputRow('outputCleaned', {readonly: true})));
  result.appendChild(ToolPage.field('反转后的字节', null, ToolPage.inputRow('outputHex', {readonly: true})));

  var asciiField = ToolPage.field('ASCII 文本', '32~126 范围外的字节以斜体显示为 [字节值]', null);
  var asciiDiv = ToolPage.el('div', 'result-value');
  asciiDiv.id = 'outputAscii';
  asciiDiv.innerHTML = '<i>（解码后的文本将显示在此处）</i>';
  asciiField.appendChild(asciiDiv);
  result.appendChild(asciiField);
  body.appendChild(result);
})();
function Convert() {
  var remove0x = document.getElementById('chkRemove0x').checked;
  var cleaned_hex = cleanHex(document.getElementById('inputHex').value, remove0x);
  document.getElementById('outputCleaned').value = cleaned_hex;

  if (cleaned_hex.length % 2) {
    showToast('错误：十六进制长度为奇数');
    return;
  }

  var binary = [];
  for (var i = 0; i < cleaned_hex.length / 2; i++) {
    var h = cleaned_hex.substr(i * 2, 2);
    binary[i] = 255 - parseInt(h, 16);
  }

  var outputSeparator = document.getElementById('chkOutput0x').checked;

  var hexStr = '';
  for (var i = 0; i < binary.length; i++) {
    if (outputSeparator) {
      hexStr += (hexStr.length ? ', 0x' : '0x');
    }
    if (binary[i] < 16) {
      hexStr += '0';
    }
    hexStr += binary[i].toString(16).toUpperCase();
  }
  document.getElementById('outputHex').value = hexStr;

  var htmlStr = '<b>';
  for (var i = 0; i < binary.length; i++) {
    if (binary[i] >= 32 && binary[i] <= 126) {
      switch (String.fromCharCode(binary[i])) {
        case '&':  htmlStr += '&amp;'; break;
        case '<':  htmlStr += '&lt;'; break;
        case '>':  htmlStr += '&gt;'; break;
        case '"':  htmlStr += '&quot;'; break;
        case '\'': htmlStr += '&#039;'; break;
        default:   htmlStr += String.fromCharCode(binary[i]);
      }
    } else {
      htmlStr += '<i>[' + binary[i] + ']</i>';
    }
  }
  htmlStr += '</b>';
  document.getElementById('outputAscii').innerHTML = htmlStr;
}
ToolPage.wireCopyButtons();
</script>
<script defer src="../animations.js"></script>
</body>
</html>
