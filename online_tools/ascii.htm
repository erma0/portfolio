  <header class="tool-header">
    <h1>ASCII ↔ 十六进制</h1>

  </header>
  <section class="tool-body">

<h2>ASCII → 十六进制</h2>
<script>
function asciiToHexConvert() {
  const input = document.frmAsciiToHex.ed_input.value;
  let separator1 = '', separator2 = '';
  if (document.frmAsciiToHex.chbSeparator.checked) {
    separator1 = '0x';
    separator2 = ', ';
  }
  let hexText = '';
  for (let i = 0; i < input.length; i++) {
    const charVal = input.charCodeAt(i);
    hexText += separator1 + dec2hex(charVal) + separator2;
  }
  document.frmAsciiToHex.hex.value = hexText;
}
</script>

<form name="frmAsciiToHex" action="">
  <p>输入文本：</p>
  <p><textarea name="ed_input" rows="10" cols="67"></textarea></p>
  <p>选项：</p>
  <p><input type="checkbox" name="chbSeparator" value="sep" id="a2h_chbSep" checked="checked"><label for="a2h_chbSep">输出添加 0x 前缀及逗号分隔符</label></p>
  <p>输出十六进制数组</p>
  <p><input type="text" name="hex" value="" readonly><button type="button" onclick="copyToClipboard(this.previousElementSibling.value)">复制</button></p>
  <p><button type="button" onclick="asciiToHexConvert()">转换</button></p>
</form>

<hr>

<h2>十六进制 → ASCII</h2>
<script>
function hexToAsciiConvert() {
  const cleaned_hex = cleanHex(document.frmHexToAscii.hex.value, document.frmHexToAscii.chbSeparator.checked);
  document.frmHexToAscii.cleaned_hex.value = cleaned_hex;
  if (cleaned_hex.length % 2) {
    showToast('错误：清理后的十六进制字符串长度为奇数。');
    return;
  }

  const bytes = hex2bytes(cleaned_hex);

  let htmlStr = '<p style="font-family: courier new, monospace"><b>';
  for (let i = 0; i < bytes.length; i++) {
    if (bytes[i] >= 32 && bytes[i] <= 126) {
      const ch = String.fromCharCode(bytes[i]);
      switch (ch) {
        case '&': htmlStr += '&amp;'; break;
        case '<': htmlStr += '&lt;'; break;
        case '>': htmlStr += '&gt;'; break;
        case '"': htmlStr += '&quot;'; break;
        case "'": htmlStr += '&#039;'; break;
        default: htmlStr += ch;
      }
    } else {
      htmlStr += '<i>[' + bytes[i] + ']</i>';
    }
  }
  htmlStr += '</b></p>';
  document.getElementById('divHexToAsciiText').innerHTML = htmlStr;
}
</script>

<form name="frmHexToAscii" action="">
  <p>十六进制字符串：</p>
  <p><input type="text" name="hex" value=""></p>
  <p>所有非十六进制字符将被忽略，"12AB34" = "12 AB 34" = "12, AB, 34" 等。输入不区分大小写。</p>
  <p>选项：</p>
  <p><input type="checkbox" name="chbSeparator" value="sep" id="h2a_chbSep" checked="checked"><label for="h2a_chbSep">移除输入中的 "0x" 前缀</label></p>
  <p>清理后的输入：</p>
  <p><input type="text" name="cleaned_hex" value="" readonly><button type="button" onclick="copyToClipboard(this.previousElementSibling.value)">复制</button></p>
  <p>解码数据（ASCII 文本），32~126 范围外的字节以斜体显示为 <i>[byte value]</i>：</p>
  <div id="divHexToAsciiText">
    <p><i>（解码后的文本将显示在此处）</i></p>
  </div>
  <p><button type="button" onclick="hexToAsciiConvert()">转换</button></p>
</form>
