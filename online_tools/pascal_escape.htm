<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本 → Pascal 字符串转义工具</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: '文本 → Pascal 字符串转义工具',
  desc: '将文本转换为 Pascal/Delphi 字符串字面量',
  body: function(body) {
    // 源文本输入
    var card1 = ToolPage.formCard();
    card1.appendChild(ToolPage.field('源文本', '输入需要转义的原始文本', ToolPage.textareaRow('ed_input', { rows: 10 })));
    body.appendChild(card1);

    // 选项
    var card2 = ToolPage.formCard();
    card2.appendChild(ToolPage.field('选项', null, ToolPage.checkbox('chbSplitLines', '将输出拆分为多行', true)));
    body.appendChild(card2);

    // 按钮
    body.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: doConvert }]));

    // 输出
    var card3 = ToolPage.el('div', 'result-card');
    card3.appendChild(ToolPage.field('Pascal 字符串字面量', null, ToolPage.textareaRow('ed_output', { rows: 10, readonly: true })));
    var hint = ToolPage.el('span', 'field-hint');
    hint.innerHTML = '已通过 <a href="https://www.lazarus-ide.org/">Lazarus</a> 简要测试';
    card3.appendChild(hint);
    body.appendChild(card3);

    function pascal_encode(input) {
      var output = '';
      var splitLines = document.getElementById('chbSplitLines').checked;
      var quoted = false;
      for (var i = 0; i < input.length; i++) {
        switch (input[i]) {
        case '\n':
          if (quoted) {
            output += "'";
            quoted = false;
          }
          if (splitLines) {
            output += '#10';
            if (i < input.length - 1) {
              output += ' +\n';
            } else {
              output += '\n';
            }
          } else {
            output += '#10';
          }
          break;
        case '\r':
          if (quoted) {
            output += "'";
            quoted = false;
          }
          output += '#13';
          break;
        case '\t':
          if (quoted) {
            output += "'";
            quoted = false;
          }
          output += '#9';
          break;
        case "'":
          if (!quoted) {
            output += "'";
            quoted = true;
          }
          output += "''";
          break;
        default:
          if (!quoted) {
            output += "'";
            quoted = true;
          }
          output += input[i];
          break;
        }
      }
      if (quoted) {
        output += "'";
      }
      return output;
    }

    function doConvert() {
      document.getElementById('ed_output').value = pascal_encode(document.getElementById('ed_input').value);
    }
  }
});
</script>
</body>
</html>
