<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本 → Pascal 字符串转义工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>文本 → Pascal 字符串转义工具</h1>
    <p class="tool-desc">将文本转换为 Pascal/Delphi 字符串字面量</p>
  </header>
  <section class="tool-body">

    <div class="form-card">
      <div class="field">
        <label class="field-label" for="ed_input">源文本</label>
        <textarea id="ed_input" rows="10"></textarea>
        <span class="field-hint">输入需要转义的原始文本</span>
      </div>
    </div>

    <div class="form-card">
      <div class="field">
        <label class="field-label">选项</label>
        <label><input type="checkbox" id="chbSplitLines" checked> 将输出拆分为多行</label>
      </div>
    </div>

    <div class="btn-group">
      <button type="button" id="btnConvert">转换</button>
    </div>

    <div class="result-card">
      <label class="field-label">Pascal 字符串字面量</label>
      <div class="input-row">
        <textarea id="ed_output" rows="10" readonly></textarea>
        <button type="button" class="btn-copy" id="btnCopyOutput"></button>
      </div>
      <span class="field-hint">已通过 <a href="https://www.lazarus-ide.org/">Lazarus</a> 简要测试</span>
    </div>

  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>

<script>
function pascal_encode(input) {
  var output = '';
  var splitLines = document.getElementById('chbSplitLines').checked;
  var quoted = false;
  for (var i = 0; i < input.length; i++) {
    switch (input[i]) {
    case '\n':
      if (quoted) {
        output += "'";
        quoted = false;
      }
      if (splitLines) {
        output += '#10';
        if (i < input.length - 1) {
          output += ' +\n';
        } else {
          output += '\n';
        }
      } else {
        output += '#10';
      }
      break;
    case '\r':
      if (quoted) {
        output += "'";
        quoted = false;
      }
      output += '#13';
      break;
    case '\t':
      if (quoted) {
        output += "'";
        quoted = false;
      }
      output += '#9';
      break;
    case "'":
      if (!quoted) {
        output += "'";
        quoted = true;
      }
      output += "''";
      break;
    default:
      if (!quoted) {
        output += "'";
        quoted = true;
      }
      output += input[i];
      break;
    }
  }
  if (quoted) {
    output += "'";
  }
  return output;
}

document.getElementById('btnCopyOutput').innerHTML = ICON_COPY;
document.getElementById('btnCopyOutput').addEventListener('click', function() {
  copyToClipboard(document.getElementById('ed_output').value);
});

document.getElementById('btnConvert').addEventListener('click', function() {
  var output = pascal_encode(document.getElementById('ed_input').value);
  document.getElementById('ed_output').value = output;
});
</script>
</body>
</html>
