<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 ↔ 十六进制</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: 'Base64 ↔ 十六进制',
  desc: '在线 Base64 与十六进制字符串互转工具，支持导出二进制文件',
  body: function(body) {

    /* ====== Base64 → 十六进制 ====== */
    var card1 = ToolPage.formCard();
    card1.appendChild(ToolPage.field('Base64 字符串', null, ToolPage.inputRow('b64_input', { placeholder: '输入 Base64 编码字符串' })));

    var opts1 = ToolPage.field('选项');
    opts1.appendChild(ToolPage.checkbox('b64_addPrefix', '输出添加 0x 前缀'));
    opts1.appendChild(ToolPage.checkbox('b64_lowercase', '使用小写十六进制字符'));
    card1.appendChild(opts1);

    card1.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: b64ToHexConvert }]));
    body.appendChild(card1);

    // 输出区域
    var resultCard1 = ToolPage.el('div', 'result-card');
    resultCard1.id = 'b64_result_card';
    resultCard1.style.display = 'none';
    resultCard1.appendChild(ToolPage.field('解码数据（十六进制）', null, ToolPage.inputRow('b64_hex_output', { readonly: true })));
    var asciiField = ToolPage.field('解码数据（ASCII 文本）', '32~126 范围外的字节以斜体显示为 [byte value]');
    var asciiDiv = ToolPage.el('div', 'result-value');
    asciiDiv.id = 'b64_ascii_output';
    asciiDiv.innerHTML = '<i>（解码后的文本将显示在此处）</i>';
    asciiField.appendChild(asciiDiv);
    resultCard1.appendChild(asciiField);
    body.appendChild(resultCard1);

    // 文件导出
    var cardFile = ToolPage.formCard();
    cardFile.appendChild(ToolPage.field('导出为二进制文件', '将解码结果保存为原始二进制文件（客户端生成）', ToolPage.inputRow('b64_filename', { value: 'myfile.dat', placeholder: '文件名' })));
    cardFile.appendChild(ToolPage.btnGroup([{ text: '转换为文件', className: 'btn-outline', onclick: b64ToHexConvertToFile }]));
    body.appendChild(cardFile);

    body.appendChild(ToolPage.divider());

    /* ====== 十六进制 → Base64 ====== */
    var card2 = ToolPage.formCard();
    card2.appendChild(ToolPage.field('十六进制字符串', '所有非十六进制字符将被忽略，"12AB34" = "12 AB 34" = "12, AB, 34" 等。输入不区分大小写。', ToolPage.inputRow('hex_input', { placeholder: '输入十六进制字符串' })));

    var opts2 = ToolPage.field('选项');
    opts2.appendChild(ToolPage.checkbox('hex_remove0x', '移除输入中的 "0x" 前缀', true));
    card2.appendChild(opts2);

    card2.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: hexToB64Convert }]));
    body.appendChild(card2);

    // 输出区域
    var resultCard2 = ToolPage.el('div', 'result-card');
    resultCard2.id = 'hex_result_card';
    resultCard2.style.display = 'none';
    resultCard2.appendChild(ToolPage.field('清理后的输入', null, ToolPage.inputRow('hex_cleaned_output', { readonly: true })));
    resultCard2.appendChild(ToolPage.field('输出（Base64）', null, ToolPage.inputRow('hex_b64_output', { readonly: true })));
    body.appendChild(resultCard2);

    var linkP = ToolPage.el('p');
    linkP.innerHTML = '相关工具：<a href="base64_multi.htm">批量 Base64 → 十六进制转换器</a>';
    body.appendChild(linkP);
  }
});

/* ---- Base64 → 十六进制 ---- */
function b64ToHexConvert() {
  var input = document.getElementById('b64_input').value;
  var bytes = base64Decode(input);
  if (!bytes.length && input.trim()) {
    showToast('无效的 Base64 输入');
    return;
  }

  var addPrefix = document.getElementById('b64_addPrefix').checked;
  var lowercase = document.getElementById('b64_lowercase').checked;
  var separator = addPrefix ? ' 0x' : '';
  var hexText = bytes2hex(bytes, separator, lowercase);

  document.getElementById('b64_hex_output').value = hexText;

  var htmlStr = '';
  for (var i = 0; i < bytes.length; i++) {
    var byte = bytes[i];
    if (byte >= 32 && byte <= 126) {
      var ch = String.fromCharCode(byte);
      switch (ch) {
        case '&': htmlStr += '&amp;'; break;
        case '<': htmlStr += '&lt;'; break;
        case '>': htmlStr += '&gt;'; break;
        case '"': htmlStr += '&quot;'; break;
        case "'": htmlStr += '&#039;'; break;
        default: htmlStr += ch;
      }
    } else {
      htmlStr += '<i>[' + byte + ']</i>';
    }
  }
  document.getElementById('b64_ascii_output').innerHTML = htmlStr || '<i>（无可显示文本）</i>';
  document.getElementById('b64_result_card').style.display = '';
}

function b64ToHexConvertToFile() {
  b64ToHexConvert();
  var hex = document.getElementById('b64_hex_output').value;
  if (!hex) {
    showToast('请先转换 Base64 数据');
    return;
  }
  var fileName = document.getElementById('b64_filename').value || 'myfile.dat';
  createFileFromHex(hex, fileName);
}

/* ---- 十六进制 → Base64 ---- */
function hexToB64Convert() {
  var input = document.getElementById('hex_input').value;
  var remove0x = document.getElementById('hex_remove0x').checked;
  var cleaned = cleanHex(input, remove0x);

  document.getElementById('hex_cleaned_output').value = cleaned;

  if (cleaned.length % 2) {
    showToast('错误：清理后的十六进制字符串长度为奇数。');
    document.getElementById('hex_b64_output').value = '';
    document.getElementById('hex_result_card').style.display = '';
    return;
  }

  var bytes = hex2bytes(cleaned);
  document.getElementById('hex_b64_output').value = base64Encode(bytes);
  document.getElementById('hex_result_card').style.display = '';
}
</script>
</body>
</html>
