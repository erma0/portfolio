<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XOR 加密/解密工具</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: 'XOR 加密/解密工具',
  desc: '对十六进制数据执行 XOR 逐字节运算',
  body: function(body) {
    var desc = ToolPage.el('p');
    desc.textContent = '计算两个十六进制字符串的 XOR 运算。约定第一个字符串（字节数组）为源数据（或明文），第二个字节数组为密钥，若密钥较短则循环使用。';
    body.appendChild(desc);

    var card1 = ToolPage.formCard();
    card1.appendChild(ToolPage.field('源数据（明文）', '第一个字节数组，十六进制字符串', ToolPage.textareaRow('hex_src', {rows: 3})));
    card1.appendChild(ToolPage.field('密钥', '第二个字节数组，长度不足时循环使用。使用 "FF" 可对所有源位取反', ToolPage.textareaRow('hex_key', {rows: 3})));

    var optField = ToolPage.field('选项', null, null);
    optField.appendChild(ToolPage.checkbox('chbSeparator', '源/密钥：移除 "0x" 前缀', true));
    optField.appendChild(document.createElement('br'));
    optField.appendChild(ToolPage.checkbox('chbSeparatorOut', '输出：使用 0x 前缀及逗号分隔符（C 风格）', true));
    optField.appendChild(document.createElement('br'));
    optField.appendChild(ToolPage.checkbox('chbNewline', '输出：每 16 字节插入换行', true));
    card1.appendChild(optField);

    card1.appendChild(ToolPage.field(null, '十六进制集合以外的字符将被忽略，因此 "12AB34" = "12 AB 34" = "12, AB, 34" 等价。字符串不区分大小写。'));
    body.appendChild(card1);

    body.appendChild(ToolPage.btnGroup([{text: '计算 XOR', onclick: Convert}]));

    var result = ToolPage.resultCard('resultArea', null);
    result.appendChild(ToolPage.field('清理后的源数据', null, ToolPage.inputRow('cleaned_hex_src', {readonly: true})));
    result.appendChild(ToolPage.field('清理后的密钥', null, ToolPage.inputRow('cleaned_hex_key', {readonly: true})));
    result.appendChild(ToolPage.field('XOR 结果（十六进制）', null, ToolPage.textareaRow('hex_out', {rows: 3, readonly: true})));
    body.appendChild(result);
  }
});

function Convert() {
  var remove0x = document.getElementById('chbSeparator').checked;

  var cleaned_hex_src = cleanHex(document.getElementById('hex_src').value, remove0x);
  document.getElementById('cleaned_hex_src').value = cleaned_hex_src;
  if (cleaned_hex_src.length % 2) {
    showToast('错误：十六进制源长度为奇数');
    return;
  }

  var cleaned_hex_key = cleanHex(document.getElementById('hex_key').value, remove0x);
  document.getElementById('cleaned_hex_key').value = cleaned_hex_key;
  if (cleaned_hex_key.length % 2) {
    showToast('错误：十六进制密钥长度为奇数');
    return;
  }

  var binary_src = [];
  for (var i = 0; i < cleaned_hex_src.length / 2; i++) {
    binary_src[i] = parseInt(cleaned_hex_src.substr(i * 2, 2), 16);
  }

  var binary_key = [];
  for (var i = 0; i < cleaned_hex_key.length / 2; i++) {
    binary_key[i] = parseInt(cleaned_hex_key.substr(i * 2, 2), 16);
  }

  var binary_out = [];
  for (var i = 0; i < binary_src.length; i++) {
    binary_out[i] = binary_src[i] ^ binary_key[i % binary_key.length];
  }

  var hexText = '';
  var separator1 = '', separator2 = '';
  var newline = document.getElementById('chbNewline').checked;
  if (document.getElementById('chbSeparatorOut').checked) {
    separator1 = '0x';
    separator2 = ', ';
  }
  for (var i = 0; i < binary_out.length; i++) {
    var charVal = binary_out[i];
    hexText += separator1 + (charVal < 16 ? '0' : '') + dec2hex(charVal) + separator2;
    if (newline && (i % 16) === 15) {
      hexText += '\n';
    }
  }
  document.getElementById('hex_out').value = hexText;
}
</script>
</body>
</html>
