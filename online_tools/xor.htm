<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XOR 加密/解密工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>XOR 加密/解密工具</h1>
    <p class="tool-desc">对十六进制数据执行 XOR 逐字节运算</p>
  </header>
  <section class="tool-body">

    <p>计算两个十六进制字符串的 XOR 运算。约定第一个字符串（字节数组）为源数据（或明文），第二个字节数组为密钥，若密钥较短则循环使用。</p>

    <div class="form-card">
      <div class="field">
        <label class="field-label" for="hex_src">源数据（明文）</label>
        <textarea id="hex_src" rows="3"></textarea>
        <span class="field-hint">第一个字节数组，十六进制字符串</span>
      </div>

      <div class="field">
        <label class="field-label" for="hex_key">密钥</label>
        <textarea id="hex_key" rows="3"></textarea>
        <span class="field-hint">第二个字节数组，长度不足时循环使用。使用 "FF" 可对所有源位取反</span>
      </div>

      <div class="field">
        <label class="field-label">选项</label>
        <label><input type="checkbox" id="chbSeparator" checked> 源/密钥：移除 "0x" 前缀</label>
        <br>
        <label><input type="checkbox" id="chbSeparatorOut" checked> 输出：使用 0x 前缀及逗号分隔符（C 风格）</label>
        <br>
        <label><input type="checkbox" id="chbNewline" checked> 输出：每 16 字节插入换行</label>
      </div>

      <div class="field">
        <span class="field-hint">十六进制集合以外的字符将被忽略，因此 "12AB34" = "12 AB 34" = "12, AB, 34" 等价。字符串不区分大小写。</span>
      </div>
    </div>

    <div class="btn-group">
      <button type="button" id="btnConvert" onclick="Convert()">计算 XOR</button>
    </div>

    <div class="result-card">
      <div class="field">
        <span class="field-label">清理后的源数据</span>
        <div class="input-row">
          <input type="text" id="cleaned_hex_src" readonly="readonly" value="">
          <button type="button" class="btn-copy" onclick="copyToClipboard(document.getElementById('cleaned_hex_src').value)" aria-label="复制"></button>
        </div>
      </div>

      <div class="field">
        <span class="field-label">清理后的密钥</span>
        <div class="input-row">
          <input type="text" id="cleaned_hex_key" readonly="readonly" value="">
          <button type="button" class="btn-copy" onclick="copyToClipboard(document.getElementById('cleaned_hex_key').value)" aria-label="复制"></button>
        </div>
      </div>

      <div class="field">
        <span class="field-label">XOR 结果（十六进制）</span>
        <div class="input-row">
          <textarea id="hex_out" rows="3" readonly="readonly"></textarea>
          <button type="button" class="btn-copy" onclick="copyToClipboard(document.getElementById('hex_out').value)" aria-label="复制"></button>
        </div>
      </div>
    </div>

  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>

<script>
// Inject copy icons into btn-copy buttons
document.querySelectorAll('.btn-copy').forEach(function (btn) {
  btn.innerHTML = ICON_COPY;
});

function Convert() {
  var remove0x = document.getElementById('chbSeparator').checked;

  var cleaned_hex_src = cleanHex(document.getElementById('hex_src').value, remove0x);
  document.getElementById('cleaned_hex_src').value = cleaned_hex_src;
  if (cleaned_hex_src.length % 2) {
    showToast('错误：十六进制源长度为奇数');
    return;
  }

  var cleaned_hex_key = cleanHex(document.getElementById('hex_key').value, remove0x);
  document.getElementById('cleaned_hex_key').value = cleaned_hex_key;
  if (cleaned_hex_key.length % 2) {
    showToast('错误：十六进制密钥长度为奇数');
    return;
  }

  var binary_src = [];
  for (var i = 0; i < cleaned_hex_src.length / 2; i++) {
    binary_src[i] = parseInt(cleaned_hex_src.substr(i * 2, 2), 16);
  }

  var binary_key = [];
  for (var i = 0; i < cleaned_hex_key.length / 2; i++) {
    binary_key[i] = parseInt(cleaned_hex_key.substr(i * 2, 2), 16);
  }

  var binary_out = [];
  for (var i = 0; i < binary_src.length; i++) {
    binary_out[i] = binary_src[i] ^ binary_key[i % binary_key.length];
  }

  var hexText = '';
  var separator1 = '', separator2 = '';
  var newline = document.getElementById('chbNewline').checked;
  if (document.getElementById('chbSeparatorOut').checked) {
    separator1 = '0x';
    separator2 = ', ';
  }
  for (var i = 0; i < binary_out.length; i++) {
    var charVal = binary_out[i];
    hexText += separator1 + (charVal < 16 ? '0' : '') + dec2hex(charVal) + separator2;
    if (newline && (i % 16) === 15) {
      hexText += '\n';
    }
  }
  document.getElementById('hex_out').value = hexText;
}
</script>
</body>
</html>
