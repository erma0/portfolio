<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>十六进制 → 十进制转换器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css" />
  <script>document.documentElement.className='js'</script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<div class="grain" aria-hidden="true"></div>
<header class="site-header" id="siteHeader" data-nav="tool"></header>
<script src="../nav.js"></script>

<main class="container">
  <header class="tool-header">
    <h1>十六进制 → 十进制转换器</h1>
    <p class="tool-desc">将十六进制数值转换为十进制</p>
  </header>
  <section class="tool-body" id="toolBody"></section>
  <footer class="page-footer">
    <p class="copyright">©鸽子笼 2020-2026</p>
  </footer>
</main>
<script src="./js/utils.js"></script>
<script src="./js/tool-page.js"></script>
<script>
(function() {
  var body = document.getElementById('toolBody');
    // 输入
    var c1 = ToolPage.formCard();
    var inp = document.createElement('input');
    inp.type = 'text'; inp.id = 'inputHex'; inp.placeholder = '例如 12AB34 或 12 AB 34';
    c1.appendChild(ToolPage.field('十六进制字符串', '十六进制集合以外的字符将被忽略，"12AB34" = "12 AB 34" = "12, AB, 34" 等价。输入不区分大小写。', inp));
    c1.appendChild(ToolPage.field('选项', null, ToolPage.checkbox('chbRemove0x', '移除输入中的 "0x" 前缀', true)));
    body.appendChild(c1);

    // 清理后的输入
    var c2 = ToolPage.formCard();
    c2.appendChild(ToolPage.field('清理后的输入', null, ToolPage.inputRow('cleanedHex', { readonly: true, placeholder: '清理后的十六进制' })));
    body.appendChild(c2);

    // 输出格式
    var c3 = ToolPage.formCard();
    var optField = ToolPage.el('div', 'field');
    var optLabel = ToolPage.el('span', 'field-label');
    optLabel.textContent = '输出格式';
    optField.appendChild(optLabel);

    var l1 = document.createElement('label');
    l1.style.cssText = 'display:block;margin-bottom:0.4rem;';
    l1.appendChild(document.createTextNode('分隔符 '));
    var sepInp = document.createElement('input');
    sepInp.type = 'text'; sepInp.id = 'separator'; sepInp.value = ', ';
    sepInp.style.cssText = 'width:4rem;display:inline;';
    l1.appendChild(sepInp);
    optField.appendChild(l1);

    var l2 = document.createElement('label');
    l2.style.cssText = 'display:block;margin-bottom:0.4rem;';
    var cb1 = document.createElement('input');
    cb1.type = 'checkbox'; cb1.id = 'chbSplitLines'; cb1.checked = true;
    l2.appendChild(cb1);
    l2.appendChild(document.createTextNode(' 拆分为多行，每行数值个数：'));
    var vplInp = document.createElement('input');
    vplInp.type = 'text'; vplInp.id = 'valuesPerLine'; vplInp.value = '8';
    vplInp.style.cssText = 'width:3rem;display:inline;';
    l2.appendChild(vplInp);
    optField.appendChild(l2);

    var l3 = document.createElement('label');
    l3.style.cssText = 'display:block;';
    var cb2 = document.createElement('input');
    cb2.type = 'checkbox'; cb2.id = 'chbPadValues'; cb2.checked = true;
    l3.appendChild(cb2);
    l3.appendChild(document.createTextNode(' 将每个数值填充空格至 3 个字符宽'));
    optField.appendChild(l3);

    c3.appendChild(optField);
    body.appendChild(c3);

    // 转换按钮
    body.appendChild(ToolPage.btnGroup([{ text: '转换', onclick: convert }]));

    // 结果
    var rc = ToolPage.el('div', 'result-card');
    rc.appendChild(ToolPage.field('十进制输出', null, ToolPage.textareaRow('outputDec', { rows: 6, readonly: true, placeholder: '转换结果将显示在此处' })));
    body.appendChild(rc);
})();

function convert() {
  var cleaned = cleanHex(
    document.getElementById('inputHex').value,
    document.getElementById('chbRemove0x').checked
  );
  document.getElementById('cleanedHex').value = cleaned;
  if (cleaned.length % 2) {
    showToast('错误：清理后的十六进制字符串长度为奇数');
    return;
  }
  var binary = [];
  for (var i = 0; i < cleaned.length / 2; i++) {
    binary[i] = parseInt(cleaned.substr(i * 2, 2), 16);
  }
  var output = '';
  var sep = document.getElementById('separator').value;
  var splitLines = document.getElementById('chbSplitLines').checked;
  var vpl = parseInt(document.getElementById('valuesPerLine').value) || 8;
  var padValues = document.getElementById('chbPadValues').checked;
  for (var i = 0; i < binary.length; i++) {
    var val = binary[i];
    if (padValues) {
      if (val < 10) output += '  ';
      else if (val < 100) output += ' ';
    }
    output += val;
    if (i !== binary.length - 1) output += sep;
    if (splitLines && i % vpl === vpl - 1) output += '\r\n';
  }
  document.getElementById('outputDec').value = output;
}
ToolPage.wireCopyButtons();
</script>
<script defer src="../animations.js"></script>
</body>
</html>
