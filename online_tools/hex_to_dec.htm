<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>十六进制 → 十进制转换器</title>
  <link rel="stylesheet" href="./css/tool.css">

</head>
<body>
<div id="bg"></div>
<main class="container">
  <nav class="top-nav">
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>十六进制 → 十进制转换器</h1>
    <p class="tool-desc">将十六进制数值转换为十进制</p>
  </header>
  <section class="tool-body">
<script type="text/javascript">
//<!--
    function clean_hex(input, remove_0x) {
        input = input.toUpperCase();
        
        if (remove_0x) {
          input = input.replace(/0x/gi, "");        
        }
        
        var orig_input = input;
        input = input.replace(/[^A-Fa-f0-9]/g, "");
        if (orig_input != input)
            alert ("警告：输入中的非十六进制字符已被忽略。");
        return input;    
    }
    
    function ShowDecodedAsText(val)
    {
        var target = document.getElementById('divDecodedText'); 
        target.innerHTML = val;    
    }       
    
    function Convert() {
      var cleaned_hex = clean_hex(document.frmConvert.hex.value, document.frmConvert.chbSeparator.checked);
      document.frmConvert.cleaned_hex.value = cleaned_hex;
      if (cleaned_hex.length % 2) {
        alert ("错误：清理后的十六进制字符串长度为奇数。");     
        return;
      }

      var binary = new Array();
      for (var i=0; i<cleaned_hex.length/2; i++) {
        var h = cleaned_hex.substr(i*2, 2);
        binary[i] = parseInt(h,16);        
      }

	  var output = "";
	  var separator = document.frmConvert.separator.value;
	  var splitLines = document.frmConvert.chbSplitLines.checked;
	  var valuesPerLine = document.frmConvert.valuesPerLine.value;		  
	  var padValues = document.frmConvert.chbPadValues.checked;
	  
      for (var i=0; i<binary.length; i++) {
		var val = binary[i];
		if (padValues) {
			if (val < 10) {
				output += "  ";
			} else if (val < 100) {
				output += " ";
			}
		}
		output += val;
		if (i != binary.length - 1) {
			output += separator;
		}
		if (splitLines) {
			if (i % valuesPerLine == (valuesPerLine-1)) {
				output += "\r\n";
			}
		}
	  }
		document.frmConvert.ed_output.value	= output;

    } 

//-->
</script>
<h3>十六进制 → 十进制序列转换器</h3>
      <form name="frmConvert" action="">
				<p>十六进制字符串：</p>
			    <p><input type="text" name="hex" value="" style="width: 550px;"></p>
        <p>注意：十六进制集合以外的字符将被忽略，因此 "12AB34" = "12 AB 34" = "12, AB, 34" 等价。
        输入不区分大小写。</p>
        <p>选项：</p>
          <p><input type="checkbox" name="chbSeparator" value="sep" checked="checked">移除输入中的 "0x" 前缀</p>
				<p>清理后的输入：</p>
			    <p><input type="text" name="cleaned_hex" readonly="readonly" value="" style="width: 550px;"></p>				
				
				<p>输出值分隔符：<input type="text" name="separator" value=", " style="width: 80px;">
				<br>
				<input type="checkbox" name="chbSplitLines" value="" checked="checked">将输出拆分为多行，每行数值个数：
				<input type="text" name="valuesPerLine" value="8" style="width: 40px;">				
				<br>
				<input type="checkbox" name="chbPadValues" value="" checked="checked">将每个数值填充空格至 3 个字符宽
				</p>
				
				<p>输出：</p>
			    <p>
				<textarea name="ed_output" rows="10" cols="87" style="width: 700px;"></textarea>				
				</p>
				
			  <p>
			    <button type=button name="btnConvert"
            onclick="Convert()">
            转换
          </button>
			  </p>
			</form>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>
</body>
</html>
