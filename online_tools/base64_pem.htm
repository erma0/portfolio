<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 ↔ PEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>Base64 ↔ PEM</h1>
    <p class="tool-desc">在线 Base64 与 PEM 格式互转工具，纯客户端运行，数据不会上传服务器</p>
  </header>
  <section class="tool-body">

    <h2>Base64 → PEM</h2>
    <p>将 Base64 字符串转换为 PEM 格式，本质是将 Base64 按每行 64 字符换行，并可选添加 PEM 头尾标识。</p>

    <div class="form-card">
      <div class="field">
        <label class="field-label" for="b64Input">输入 Base64</label>
        <textarea id="b64Input" rows="4" placeholder="粘贴 Base64 字符串（单行或多行）"></textarea>
        <span class="field-hint">支持单行或多行输入，非 Base64 字符将被自动忽略</span>
      </div>
      <div class="field">
        <label class="field-label" for="b64HeaderType">头/尾标识类型</label>
        <select id="b64HeaderType">
          <option value="- none -">- 无 -</option>
          <option value="CERTIFICATE">CERTIFICATE</option>
          <option value="PRIVATE KEY">PRIVATE KEY</option>
          <option value="PUBLIC KEY">PUBLIC KEY</option>
          <option value="RSA PRIVATE KEY">RSA PRIVATE KEY</option>
          <option value="RSA PUBLIC KEY">RSA PUBLIC KEY</option>
          <option value="EC PRIVATE KEY">EC PRIVATE KEY</option>
        </select>
      </div>
      <div class="btn-group">
        <button type="button" id="btnB64ToPem">转换</button>
      </div>
    </div>

    <div class="result-card">
      <span class="field-label">清理后的 Base64</span>
      <div class="input-row">
        <input type="text" id="b64Cleaned" readonly="readonly" placeholder="转换后显示">
        <button type="button" class="btn-copy" id="btnCopyCleaned"></button>
      </div>
    </div>

    <div class="result-card">
      <span class="field-label">输出 PEM</span>
      <div style="position:relative;">
        <textarea id="b64Output" rows="12" readonly="readonly" placeholder="转换后显示"></textarea>
        <button type="button" class="btn-copy" id="btnCopyPem" style="position:absolute;top:0.4rem;right:0.4rem;"></button>
      </div>
    </div>

    <hr>

    <h2>PEM → Base64</h2>
    <p>将 PEM 格式转换为 Base64，本质是合并多行 Base64，可选移除 PEM 头尾标识。</p>

    <div class="form-card">
      <div class="field">
        <label class="field-label" for="pemInput">粘贴 PEM 内容</label>
        <textarea id="pemInput" rows="10" placeholder="粘贴 PEM 格式内容"></textarea>
      </div>
      <div class="field">
        <input type="checkbox" id="pemRemoveHeader" checked="checked">
        <label for="pemRemoveHeader">移除 PEM 头尾标识</label>
      </div>
      <div class="btn-group">
        <button type="button" id="btnPemToB64">转换</button>
      </div>
    </div>

    <div class="result-card">
      <span class="field-label">输出 Base64</span>
      <div style="position:relative;">
        <textarea id="pemOutput" rows="8" readonly="readonly" placeholder="转换后显示"></textarea>
        <button type="button" class="btn-copy" id="btnCopyB64" style="position:absolute;top:0.4rem;right:0.4rem;"></button>
      </div>
    </div>

  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>

<script>
(function() {
  function cleanBase64(input) {
    var output = input.replace(/[^A-Za-z0-9+/=]/g, '');
    if (output !== input) {
      showToast('警告：非 Base64 字符已被忽略');
    }
    return output;
  }

  function b64ToPemConvert() {
    var cleanedBase64 = cleanBase64(document.getElementById('b64Input').value);
    document.getElementById('b64Cleaned').value = cleanedBase64;

    var wrapped = cleanedBase64.replace(/(\S{64}(?!$))/g, '$1\r\n');
    var header = document.getElementById('b64HeaderType').value;
    if (header !== '- none -') {
      wrapped = '-----BEGIN ' + header + '-----\r\n'
        + wrapped
        + '\r\n-----END ' + header + '-----\r\n';
    }
    document.getElementById('b64Output').value = wrapped;
  }

  function pemToB64Convert() {
    var input = document.getElementById('pemInput').value;
    var removeHeaderAndFooter = document.getElementById('pemRemoveHeader').checked;
    var output = '';

    if (!removeHeaderAndFooter) {
      output = input.replace(/\r/g, '').replace(/\n/g, '');
    } else {
      var lines = input.split(/\r?\n/);
      for (var i = 0; i < lines.length; i++) {
        if (lines[i].indexOf('-----') < 0) {
          output += lines[i];
        }
      }
    }

    document.getElementById('pemOutput').value = output;
  }

  // 初始化复制按钮图标
  document.getElementById('btnCopyCleaned').innerHTML = ICON_COPY;
  document.getElementById('btnCopyPem').innerHTML = ICON_COPY;
  document.getElementById('btnCopyB64').innerHTML = ICON_COPY;

  // 绑定复制事件
  document.getElementById('btnCopyCleaned').addEventListener('click', function() {
    copyToClipboard(document.getElementById('b64Cleaned').value);
  });
  document.getElementById('btnCopyPem').addEventListener('click', function() {
    copyToClipboard(document.getElementById('b64Output').value);
  });
  document.getElementById('btnCopyB64').addEventListener('click', function() {
    copyToClipboard(document.getElementById('pemOutput').value);
  });

  // 绑定转换事件
  document.getElementById('btnB64ToPem').addEventListener('click', b64ToPemConvert);
  document.getElementById('btnPemToB64').addEventListener('click', pemToB64Convert);
})();
</script>
</body>
</html>
