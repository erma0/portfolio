<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>十六进制 → 文件下载器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<div id="bg"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>十六进制 → 文件下载器</h1>
    <p class="tool-desc">将十六进制字符串转换为二进制文件并下载，纯客户端运行</p>
  </header>
  <section class="tool-body">
<script>
function doConvert() {
  const hex = document.frmConvert.hex.value;
  const remove0x = document.frmConvert.chbSeparator.checked;
  const filename = document.frmConvert.filename.value;
  const cleaned = cleanHex(hex, remove0x);
  document.frmConvert.cleaned_hex.value = cleaned;
  if (!cleaned) { showToast('请输入十六进制字符串'); return; }
  createFileFromHex(cleaned, filename);
}
</script>
<p>从十六进制字符串生成任意二进制文件。纯客户端，数据不会上传。</p>
<form name="frmConvert" action="">
  <p>十六进制字符串：</p>
  <p><textarea name="hex" rows="8" cols="67"></textarea></p>
  <p>十六进制集合以外的字符将被忽略，"12AB34" = "12 AB 34" = "12, AB, 34" 等价。输入不区分大小写。</p>
  <p>选项：</p>
  <p><input type="checkbox" name="chbSeparator" value="sep" checked="checked">移除输入中的 "0x" 前缀</p>
  <p>清理后的输入：</p>
  <p><input type="text" name="cleaned_hex" readonly="readonly" value=""><button type="button" onclick="copyToClipboard(this.previousElementSibling.value)">复制</button></p>
  <p>文件名：</p>
  <p><input type="text" name="filename" value="myfile.dat"></p>
  <p><button type="button" onclick="doConvert()">转换并下载</button></p>
</form>
<br>
<p>对于较大的（超过几 MB）数据集，<a href="http://erma0.cn/bin/hex_to_file/hex_to_file.exe">hex_to_file.exe（Windows）</a> 可能更有用。
另一个较旧的控制台程序：<a href="http://erma0.cn/bin/hex2bin/hex2bin.zip">hex2bin.zip</a>。</p>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>
</body>
</html>
