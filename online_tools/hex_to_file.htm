<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>十六进制 → 文件下载器</title>
  <script src="./js/utils.js"></script>
  <script src="./js/tool-page.js"></script>
</head>
<body>
<noscript><p style="text-align:center;padding:4rem">此工具需要 JavaScript 支持。</p></noscript>
<script>
ToolPage.render({
  title: '十六进制 → 文件下载器',
  desc: '将十六进制字符串转换为二进制文件并下载，纯客户端运行',
  body: function(body) {
    // 描述
    var desc = ToolPage.el('p');
    desc.textContent = '从十六进制字符串生成任意二进制文件。纯客户端，数据不会上传。';
    body.appendChild(desc);

    // 输入
    var c1 = ToolPage.formCard();
    var ta = document.createElement('textarea');
    ta.id = 'hexInput'; ta.rows = 8; ta.placeholder = '输入十六进制字符串，如 48656C6C6F';
    c1.appendChild(ToolPage.field('十六进制字符串', '十六进制集合以外的字符将被忽略，"12AB34" = "12 AB 34" = "12, AB, 34" 等价。输入不区分大小写。', ta));
    c1.appendChild(ToolPage.field(null, null, ToolPage.checkbox('hexRemove0x', '移除输入中的 "0x" 前缀', true)));
    var fnInput = document.createElement('input');
    fnInput.type = 'text'; fnInput.id = 'hexFilename'; fnInput.value = 'myfile.dat';
    c1.appendChild(ToolPage.field('文件名', null, fnInput));
    c1.appendChild(ToolPage.btnGroup([{ text: '转换并下载', onclick: doConvert }]));
    body.appendChild(c1);

    // 清理后的输入
    var rc = ToolPage.el('div', 'result-card');
    var rcLabel = ToolPage.el('span', 'field-label');
    rcLabel.textContent = '清理后的输入';
    rc.appendChild(rcLabel);
    rc.appendChild(ToolPage.inputRow('hexCleaned', { readonly: true, placeholder: '转换后显示' }));
    body.appendChild(rc);

    // 外部工具链接
    var links = ToolPage.el('p');
    links.innerHTML = '对于较大的（超过几 MB）数据集，<a href="http://erma0.cn/bin/hex_to_file/hex_to_file.exe">hex_to_file.exe（Windows）</a> 可能更有用。另一个较旧的控制台程序：<a href="http://erma0.cn/bin/hex2bin/hex2bin.zip">hex2bin.zip</a>。';
    body.appendChild(links);
  }
});

function doConvert() {
  var hex = document.getElementById('hexInput').value;
  var remove0x = document.getElementById('hexRemove0x').checked;
  var filename = document.getElementById('hexFilename').value;
  var cleaned = cleanHex(hex, remove0x);
  document.getElementById('hexCleaned').value = cleaned;
  if (!cleaned) {
    showToast('请输入十六进制字符串');
    return;
  }
  createFileFromHex(cleaned, filename);
}
</script>
</body>
</html>
