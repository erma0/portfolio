<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>十六进制 → 文件下载器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>十六进制 → 文件下载器</h1>
    <p class="tool-desc">将十六进制字符串转换为二进制文件并下载，纯客户端运行</p>
  </header>
  <section class="tool-body">

    <p>从十六进制字符串生成任意二进制文件。纯客户端，数据不会上传。</p>

    <div class="form-card">
      <div class="field">
        <label class="field-label" for="hexInput">十六进制字符串</label>
        <textarea id="hexInput" rows="8" placeholder="输入十六进制字符串，如 48656C6C6F"></textarea>
        <span class="field-hint">十六进制集合以外的字符将被忽略，"12AB34" = "12 AB 34" = "12, AB, 34" 等价。输入不区分大小写。</span>
      </div>
      <div class="field">
        <input type="checkbox" id="hexRemove0x" checked="checked">
        <label for="hexRemove0x">移除输入中的 "0x" 前缀</label>
      </div>
      <div class="field">
        <label class="field-label" for="hexFilename">文件名</label>
        <input type="text" id="hexFilename" value="myfile.dat">
      </div>
      <div class="btn-group">
        <button type="button" id="btnConvert">转换并下载</button>
      </div>
    </div>

    <div class="result-card">
      <span class="field-label">清理后的输入</span>
      <div class="input-row">
        <input type="text" id="hexCleaned" readonly="readonly" placeholder="转换后显示">
        <button type="button" class="btn-copy" id="btnCopyCleaned"></button>
      </div>
    </div>

    <p>对于较大的（超过几 MB）数据集，<a href="http://erma0.cn/bin/hex_to_file/hex_to_file.exe">hex_to_file.exe（Windows）</a> 可能更有用。
    另一个较旧的控制台程序：<a href="http://erma0.cn/bin/hex2bin/hex2bin.zip">hex2bin.zip</a>。</p>

  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>

<script>
(function() {
  function doConvert() {
    var hex = document.getElementById('hexInput').value;
    var remove0x = document.getElementById('hexRemove0x').checked;
    var filename = document.getElementById('hexFilename').value;
    var cleaned = cleanHex(hex, remove0x);
    document.getElementById('hexCleaned').value = cleaned;
    if (!cleaned) {
      showToast('请输入十六进制字符串');
      return;
    }
    createFileFromHex(cleaned, filename);
  }

  // 初始化复制按钮图标
  document.getElementById('btnCopyCleaned').innerHTML = ICON_COPY;
  document.getElementById('btnCopyCleaned').addEventListener('click', function() {
    copyToClipboard(document.getElementById('hexCleaned').value);
  });

  // 绑定转换事件
  document.getElementById('btnConvert').addEventListener('click', doConvert);
})();
</script>
</body>
</html>
