<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量 Base64 → 十六进制转换器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./css/tool.css">
  <script src="./js/utils.js"></script>
</head>
<body>
<div class="grain" aria-hidden="true"></div>
<main class="container">
  <nav class="top-nav">
    <a href="../index.html" class="back-link">← 作品集</a>
    <a href="./index.html">← 工具列表</a>
  </nav>
  <header class="tool-header">
    <h1>批量 Base64 → 十六进制转换器</h1>
    <p class="tool-desc">逐行将多个 Base64 字符串转换为十六进制</p>
  </header>
  <section class="tool-body">
    <p>将 Base64 字符串列表（每行一个，可从 LibreOffice/OpenOffice Calc 单列导出为 CSV）批量转换为十六进制字符串列表。每行输出包含十六进制字符串及逗号后的状态信息，若转换失败或含非法字符则会标注，输出结果可作为两列 CSV 再次导入 Calc。</p>

    <div class="form-card">
      <div class="field">
        <label class="field-label" for="encoded">Base64 字符串列表</label>
        <textarea id="encoded" rows="10" placeholder="每行一个 Base64 字符串"></textarea>
        <span class="field-hint">每行一个 = 1 个 CSV 列</span>
      </div>
    </div>

    <div class="form-card">
      <div class="field">
        <label class="field-label">选项</label>
        <label><input type="checkbox" id="chbSeparator"> 输出添加 0x 前缀</label>
        <br>
        <label><input type="checkbox" id="chbLowercaseOutput"> 使用小写十六进制字符</label>
      </div>
    </div>

    <div class="btn-group">
      <button type="button" onclick="Convert()">转换</button>
    </div>

    <div class="result-card">
      <div class="field">
        <label class="field-label" for="hexOutput">解码数据（十六进制）+ 注释</label>
        <div class="input-row">
          <textarea id="hexOutput" rows="10" readonly></textarea>
          <button type="button" class="btn-copy" onclick="copyToClipboard(document.getElementById('hexOutput').value)"></button>
        </div>
        <span class="field-hint">双列 CSV 格式，第二列为空 = 无错误</span>
      </div>
    </div>
  </section>
  <footer class="page-footer">
    <p class="copyright">@鸽子笼 2020-2026</p>
  </footer>
</main>

<script>
document.querySelectorAll('.btn-copy').forEach(function(btn){ btn.innerHTML = ICON_COPY; });

function Convert() {
  var separator = "";
  if (document.getElementById('chbSeparator').checked)
    separator = " 0x";
  var lowercase = document.getElementById('chbLowercaseOutput').checked;
  var lines = document.getElementById('encoded').value.split('\n');
  var hexText = "";
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) { hexText += "\r\n"; continue; }
    var orig_input = line;
    var output = base64Decode(line);
    var status = "";
    var cleaned = line.replace(/[^A-Za-z0-9+\/=]/g, "");
    if (cleaned.length % 4 !== 0) {
      status = "错误：输入长度不是 4 字节的整数倍";
    } else if (orig_input !== cleaned) {
      status = "警告：输入字符串中超出 Base64 范围的字符已被忽略。";
    }
    var hexLine = bytes2hex(output, separator, lowercase);
    hexText += hexLine + ", " + status + "\r\n";
  }
  document.getElementById('hexOutput').value = hexText;
}
</script>
</body>
</html>
