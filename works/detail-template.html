  <meta name="description" content="<!-- DESCRIPTION -->" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-header" id="siteHeader" data-nav="works"></header>
  <script src="../nav.js"></script>

  <button class="back-to-top" id="backToTop" aria-label="回到顶部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <div class="detail">

    <header class="detail-head">
      <h1><!-- TITLE --></h1>
      <div class="detail-meta">
        <span class="detail-type <!-- TYPE_CLASS -->">
          <!-- TYPE_LABEL: 桌面应用 / 网页工具 / 开源项目 -->
        </span>
        <span><!-- STACK --></span>
      </div>
    </header>

    <div class="detail-body">
      <!-- BODY_START -->

      <!-- 截图网格示例：
      <div class="detail-screens">
        <div class="detail-placeholder">截图 1</div>
        <div class="detail-placeholder">截图 2</div>
      </div>
      -->

      <!-- 下载按钮示例：
      <div class="detail-downloads">
        <a class="btn-dl" href="#">
          <svg ...></svg> Windows
        </a>
      </div>
      -->

      <!-- GitHub 链接示例：
      <p class="detail-repo">
        <a href="https://github.com/erma0/REPO" target="_blank" rel="noopener">
          GitHub →
        </a>
      </p>
      -->

      <!-- BODY_END -->
    </div>
  </div>

  <footer class="site-footer">
    <p class="site-footer__row">
      <a href="https://erma0.cn">主页</a>
      <span class="sep">·</span>
      <a href="../">作品集</a>
      <span class="sep">·</span>
      <a href="https://github.com/erma0" target="_blank" rel="noopener">GitHub</a>
    </p>
    <p class="site-footer__small">© 2026 鸽子笼</p>
  </footer>

  <script>
  (function(){
    var header = document.getElementById('siteHeader');
    var backBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', function(){
      var y = window.scrollY;
      if(header) header.classList.toggle('is-scrolled', y > 40);
      if(backBtn) backBtn.classList.toggle('is-visible', y > 400);
    }, {passive: true});
    if(backBtn) backBtn.addEventListener('click', function(){
      window.scrollTo({top:0, behavior:'smooth'});
    });
  })();
  </script>
</body>
